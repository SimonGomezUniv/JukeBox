<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonicGlass A1 – Premium Floating Speaker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400;600;800&family=Cinzel:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: rgba(255, 255, 255, 0.95);
            --glass-bg: rgba(10, 10, 12, 0.15);
            --glass-border: rgba(255, 255, 255, 0.08);
            --karaoke-progress: 0%;
            --ui-opacity: 1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #020204;
            color: var(--primary);
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            perspective: 1200px;
        }

        /* --- Liquid Glass Screen Glare Overlay --- */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 40%, rgba(255,255,255,0) 60%, rgba(255,255,255,0.01) 100%);
            pointer-events: none;
            z-index: 999;
        }

        /* --- Canvas Background Fluid --- */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            filter: blur(40px) saturate(160%);
        }

        /* --- Main Layout --- */
        #app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* --- Viewport Paroles --- */
        #lyrics-display {
            flex-grow: 1;
            width: 85%;
            max-width: 1400px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            position: relative;
            transform-style: preserve-3d;
            mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 25%, black 75%, transparent 100%);
        }

        .lyric-line {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            width: 100%;
            will-change: transform, opacity, filter;
            transition: opacity 0.2s ease;
        }

        /* ==========================================================================
           ART DIRECTION: LYRIC MODES INTERPOLATIONS
           ========================================================================== */

        /* --- 1. FLOATING (Cinematic visionOS) --- */
        .mode-floating .lyric-line {
            font-size: clamp(2.2rem, 5.5vw, 4.5rem);
            font-weight: 100;
            letter-spacing: -2px;
            transform: translateZ(120px) scale(1.15);
            filter: blur(30px);
        }
        .mode-floating .lyric-line.active {
            opacity: 1;
            transform: translateZ(0) scale(1);
            filter: blur(0px);
            text-shadow: 0 0 30px rgba(255,255,255,0.15);
        }
        .mode-floating .lyric-line.past {
            opacity: 0;
            transform: translateY(-60px) translateZ(-80px) scale(0.9);
            filter: blur(15px);
        }

        /* --- 2. KARAOKE (Emissive Bold) --- */
        .mode-karaoke .lyric-line {
            font-size: clamp(2.8rem, 6.5vw, 5.5rem);
            font-weight: 800;
            letter-spacing: -3px;
            color: rgba(255,255,255,0.08);
            transform: scale(0.96);
            filter: blur(2px);
        }
        .mode-karaoke .lyric-line.active {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
            background: linear-gradient(to right, #ffffff var(--karaoke-progress), rgba(255,255,255,0.08) var(--karaoke-progress));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(255,255,255,0.4));
        }
        .mode-karaoke .lyric-line.past {
            opacity: 0;
            transform: scale(1.04);
            filter: blur(10px);
        }

        /* --- 3. BD 3D (Comic Panel Slam) --- */
        .mode-bd .lyric-line {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 800;
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: 2px;
            color: #fff;
            transform: rotateY(45deg) rotateX(-30deg) translateZ(300px) scale(1.5);
            filter: blur(20px);
        }
        .mode-bd .lyric-line.active {
            opacity: 1;
            transform: rotateY(-8deg) rotateX(12deg) translateZ(0) scale(1);
            filter: blur(0px);
            text-shadow: -6px 6px 0px rgba(255, 255, 255, 0.15), -12px 12px 0px rgba(255,255,255,0.05);
        }
        .mode-bd .lyric-line.past {
            opacity: 0;
            transform: rotateY(-20deg) translateY(-80px) scale(0.8);
            filter: blur(8px);
        }

        /* --- 4. NEON (Gas Discharge Flicker) --- */
        .mode-neon .lyric-line {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.2rem, 5.5vw, 4.2rem);
            font-weight: 500;
            color: #e3f9ff;
            transform: scale(0.98);
            filter: opacity(0);
        }
        .mode-neon .lyric-line.active {
            opacity: 1;
            transform: scale(1);
            animation: neon-flicker-ambient 0.15s infinite alternate;
        }
        .mode-neon .lyric-line.past {
            opacity: 0;
            transform: scale(1.02);
            filter: blur(20px);
        }
        @keyframes neon-flicker-ambient {
            0%, 100% { text-shadow: 0 0 4px #fff, 0 0 10px #0ff, 0 0 30px #0ff, 0 0 60px #0ff; }
            50% { text-shadow: 0 0 2px #fff, 0 0 8px #0ff, 0 0 20px #0ff, 0 0 40px #0ff; opacity: 0.92; }
        }

        /* --- 5. WAVE (Fluid Kinetic Text) --- */
        .mode-wave .lyric-line { font-size: clamp(2rem, 5vw, 3.8rem); font-weight: 200; letter-spacing: 2px; }
        .mode-wave .lyric-line.active { opacity: 1; }
        .mode-wave .lyric-line span { display: inline-block; will-change: transform, opacity; }
        .mode-wave .lyric-line.past { opacity: 0; transform: translateY(-30px); filter: blur(10px); }

        /* --- 6. MINIMAL (Swiss Typographic Line) --- */
        .mode-minimal .lyric-line {
            font-size: clamp(1.2rem, 2.5vw, 2.2rem);
            font-weight: 400;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
            transform: translateY(20px);
        }
        .mode-minimal .lyric-line.active {
            opacity: 1;
            color: #fff;
            transform: translateY(0);
        }
        .mode-minimal .lyric-line.past {
            opacity: 0;
            transform: translateY(-20px);
        }


        /* ==========================================================================
           ULTRA-PREMIUM GLASSMORPHISM CONTROL BAR (DOCK)
           ========================================================================== */
        #controls-wrapper {
            position: absolute;
            bottom: 50px;
            width: 90%;
            max-width: 680px;
            z-index: 100;
            opacity: var(--ui-opacity);
            transform: translateY(0px);
            will-change: opacity, transform;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #controls-wrapper.idle {
            --ui-opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .glass-dock {
            background: rgba(15, 15, 20, 0.25);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            padding: 16px 28px;
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.4),
                inset 0 1px 1px rgba(255,255,255,0.1),
                inset 0 -1px 2px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        /* Progress Bar Liquid Track */
        .progress-container {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.06);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
            transition: height 0.2s;
        }
        .progress-container:hover { height: 5px; }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.7), #ffffff);
            border-radius: 10px;
            width: 0%;
            pointer-events: none;
            box-shadow: 0 0 12px #fff;
        }

        /* Minimal Button Assets */
        button, select {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
            font-family: inherit;
            outline: none;
            transition: color 0.3s, transform 0.2s;
        }
        button:hover { color: #fff; }
        
        .play-btn {
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: center; align-items: center;
            color: #fff;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }
        .play-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
        
        .dock-icon {
            width: 36px; height: 36px;
            border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
        }
        .dock-icon:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.05); }
        
        select {
            appearance: none;
            background: rgba(0,0,0,0.4);
            padding: 8px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            color: rgba(255,255,255,0.8);
            text-align: center;
            cursor: pointer;
        }
        select:hover { background: rgba(0,0,0,0.6); color: #fff; }

        /* HUD Global Message Start */
        #init-hud {
            position: absolute;
            font-weight: 100;
            font-size: 1.1rem;
            letter-spacing: 3px;
            opacity: 0.3;
            text-transform: uppercase;
            pointer-events: none;
            transition: opacity 1s;
        }

        #drop-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2,2,4,0.7); backdrop-filter: blur(20px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        #drop-overlay.active { opacity: 1; pointer-events: all; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="app-container">
        
        <div id="init-hud">SonicGlass A1 · Standby</div>

        <div id="lyrics-display" class="mode-floating"></div>

        <div id="controls-wrapper">
            <div class="glass-dock">
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="controls-row">
                    <span id="time-current" style="font-size: 0.75rem; font-family: monospace; opacity: 0.5; width: 45px;">00:00</span>
                    
                    <button class="dock-icon" id="btn-audio" title="Charger Fichier Audio">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    </button>
                    <input type="file" id="file-audio" accept="audio/*">

                    <button class="dock-icon" id="btn-lrc" title="Charger Synchro LRC">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                    </button>
                    <input type="file" id="file-lrc" accept=".lrc">

                    <button class="play-btn" id="btn-play">
                        <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    
                    <select id="mode-selector">
                        <option value="mode-floating">Floating</option>
                        <option value="mode-karaoke">Karaoké</option>
                        <option value="mode-bd">BD 3D</option>
                        <option value="mode-neon">Neon</option>
                        <option value="mode-wave">Wave</option>
                        <option value="mode-minimal">Minimal</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="drop-overlay">
            <div style="font-weight:100; letter-spacing:4px; text-transform:uppercase;">Importer les ressources</div>
        </div>
    </div>

    <script>
        // --- 1. Parametric Audio Core Engine ---
        class AudioEngine {
            constructor() {
                this.audio = new Audio();
                this.audio.crossOrigin = "anonymous";
                this.context = null; this.analyser = null; this.source = null; this.dataArray = null;
                this.bass = 0; this.mid = 0; this.treble = 0;
                
                this.audio.addEventListener('ended', () => {
                    document.getElementById('icon-play').style.display = 'block';
                    document.getElementById('icon-pause').style.display = 'none';
                });
            }
            init() {
                if (this.context) return;
                this.context = new (window.AudioContext || window.webkitAudioContext)();
                this.analyser = this.context.createAnalyser();
                this.analyser.fftSize = 512;
                this.source = this.context.createMediaElementSource(this.audio);
                this.source.connect(this.analyser);
                this.analyser.connect(this.context.destination);
                this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
            }
            load(url) { this.audio.src = url; this.audio.load(); }
            togglePlay() {
                if (!this.context) this.init();
                if (this.context.state === 'suspended') this.context.resume();
                if (this.audio.paused) { this.audio.play(); return true; } 
                else { this.audio.pause(); return false; }
            }
            seek(percent) { if(this.audio.duration) this.audio.currentTime = percent * this.audio.duration; }
            updateData() {
                if (!this.analyser || this.audio.paused) {
                    this.bass = this.mid = this.treble = 0;
                    return;
                }
                this.analyser.getByteFrequencyData(this.dataArray);
                
                // Fine frequency spectrum routing
                let bSum = 0, mSum = 0, tSum = 0;
                for(let i=0; i<8; i++) bSum += this.dataArray[i];       // Basses
                for(let i=8; i<64; i++) mSum += this.dataArray[i];      // Médiums
                for(let i=64; i<128; i++) tSum += this.dataArray[i];    // Aigus
                
                this.bass = bSum / 8;
                this.mid = mSum / 56;
                this.treble = tSum / 64;

                let targetScale = 1 + (this.bass / 255) * 0.04;
                document.documentElement.style.setProperty('--bass-scale', targetScale);
            }
        }

        // --- 2. LRC Parser ---
        class LRCParser {
            static parse(lrcText) {
                const lines = lrcText.split('\n'); const lyrics = []; const regex = /\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/;
                lines.forEach(line => {
                    const match = regex.exec(line);
                    if (match) {
                        const time = parseInt(match[1], 10) * 60 + parseFloat(match[2]);
                        const text = match[3].trim();
                        if (text) lyrics.push({ time, text, duration: 0 });
                    }
                });
                for(let i=0; i<lyrics.length-1; i++) lyrics[i].duration = lyrics[i+1].time - lyrics[i].time;
                if(lyrics.length > 0) lyrics[lyrics.length-1].duration = 6;
                return lyrics;
            }
        }

        // --- 3. Fluid Liquid Glass Visualizer ---
        class FluidVisualizer {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId); this.ctx = this.canvas.getContext('2d');
                this.blobs = []; this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Instantiating custom metamorphic fluid nodes
                this.blobs.push({x: 0.25, y: 0.3, vx: 0.002, vy: 0.003, baseR: 0.22, color: 'rgba(28, 48, 88, 0.45)', curR: 0});
                this.blobs.push({x: 0.75, y: 0.7, vx: -0.003, vy: -0.002, baseR: 0.28, color: 'rgba(74, 34, 78, 0.35)', curR: 0});
                this.blobs.push({x: 0.5, y: 0.5, vx: 0.001, vy: -0.004, baseR: 0.18, color: 'rgba(20, 68, 80, 0.40)', curR: 0});
            }
            resize() {
                this.w = window.innerWidth; this.h = window.innerHeight;
                this.canvas.width = this.w; this.canvas.height = this.h;
            }
            draw(audio) {
                // Liquid glass feedback trace
                this.ctx.fillStyle = '#020204';
                this.ctx.fillRect(0, 0, this.w, this.h);

                // Morphing engine running math lerp for blob expansion based on frequencies
                this.blobs.forEach((b, i) => {
                    b.x += b.vx * (1 + audio.bass/100);
                    b.y += b.vy * (1 + audio.mid/100);

                    if(b.x < 0 || b.x > 1) b.vx *= -1;
                    if(b.y < 0 || b.y > 1) b.vy *= -1;

                    let mod = (i === 0) ? audio.bass : (i === 1) ? audio.mid : audio.treble;
                    let targetRadius = (b.baseR + (mod / 255) * 0.15) * Math.max(this.w, this.h);
                    b.curR += (targetRadius - b.curR) * 0.1; // Lerp inertia radius

                    let grad = this.ctx.createRadialGradient(b.x * this.w, b.y * this.h, 0, b.x * this.w, b.y * this.h, b.curR);
                    grad.addColorStop(0, b.color);
                    grad.addColorStop(1, 'rgba(2,2,4,0)');

                    this.ctx.fillStyle = grad;
                    this.ctx.fillRect(0, 0, this.w, this.h);
                });
            }
        }

        // --- 4. System Core Orchestration ---
        class App {
            constructor() {
                this.audioEngine = new AudioEngine();
                this.visualizer = new FluidVisualizer('bg-canvas');
                this.lyrics = []; this.currentLyricIndex = -1; this.mode = 'mode-floating';
                this.waveTime = 0;

                this.uiSetup();
                this.loop = this.loop.bind(this);
                requestAnimationFrame(this.loop);
            }

            uiSetup() {
                document.getElementById('btn-audio').addEventListener('click', () => document.getElementById('file-audio').click());
                document.getElementById('btn-lrc').addEventListener('click', () => document.getElementById('file-lrc').click());

                document.getElementById('file-audio').addEventListener('change', e => { if(e.target.files.length > 0) this.handleAudio(e.target.files[0]); });
                document.getElementById('file-lrc').addEventListener('change', e => { if(e.target.files.length > 0) this.handleLRC(e.target.files[0]); });

                const btnPlay = document.getElementById('btn-play');
                const iconPlay = document.getElementById('icon-play');
                const iconPause = document.getElementById('icon-pause');
                
                btnPlay.addEventListener('click', () => {
                    const isPlaying = this.audioEngine.togglePlay();
                    iconPlay.style.display = isPlaying ? 'none' : 'block';
                    iconPause.style.display = isPlaying ? 'block' : 'none';
                });

                document.getElementById('progress-container').addEventListener('click', e => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    this.audioEngine.seek((e.clientX - rect.left) / rect.width);
                });

                document.getElementById('mode-selector').addEventListener('change', e => {
                    document.getElementById('lyrics-display').className = e.target.value;
                    this.mode = e.target.value;
                    this.renderAllLyrics();
                });

                // Drag and drop interface routing
                const overlay = document.getElementById('drop-overlay');
                window.addEventListener('dragover', e => { e.preventDefault(); overlay.classList.add('active'); });
                overlay.addEventListener('dragleave', () => overlay.classList.remove('active'));
                overlay.addEventListener('drop', e => {
                    e.preventDefault(); overlay.classList.remove('active');
                    let audioFile, lrcFile;
                    for (let f of e.dataTransfer.files) {
                        if (f.type.startsWith('audio/')) audioFile = f;
                        if (f.name.endsWith('.lrc')) lrcFile = f;
                    }
                    if(audioFile) this.handleAudio(audioFile);
                    if(lrcFile) this.handleLRC(lrcFile);
                });

                // Human-centric idle visibility logic
                let hideTimeout;
                const wrapper = document.getElementById('controls-wrapper');
                const awakeUI = () => {
                    wrapper.classList.remove('idle');
                    document.body.style.cursor = 'default';
                    clearTimeout(hideTimeout);
                    hideTimeout = setTimeout(() => {
                        if(!this.audioEngine.audio.paused) {
                            wrapper.classList.add('idle');
                            document.body.style.cursor = 'none';
                        }
                    }, 2500);
                };
                ['mousemove', 'touchstart', 'click'].forEach(evt => window.addEventListener(evt, awakeUI));
                awakeUI();
            }

            handleAudio(file) {
                this.audioEngine.load(URL.createObjectURL(file));
                document.getElementById('init-hud').style.opacity = '0';
                this.audioEngine.togglePlay();
                document.getElementById('icon-play').style.display = 'none';
                document.getElementById('icon-pause').style.display = 'block';
            }

            handleLRC(file) {
                const reader = new FileReader();
                reader.onload = e => {
                    this.lyrics = LRCParser.parse(e.target.result);
                    this.currentLyricIndex = -1;
                    document.getElementById('init-hud').style.opacity = '0';
                    this.renderAllLyrics();
                };
                reader.readAsText(file);
            }

            renderAllLyrics() {
                const container = document.getElementById('lyrics-display');
                container.innerHTML = '';
                this.lyrics.forEach((lyric, index) => {
                    const div = document.createElement('div');
                    div.className = 'lyric-line future';
                    div.id = `lyric-${index}`;
                    
                    if(this.mode === 'mode-wave') {
                        // Splitting characters for standalone matrix tracking
                        lyric.text.split('').forEach(char => {
                            const span = document.createElement('span');
                            span.textContent = char === ' ' ? '\u00A0' : char;
                            div.appendChild(span);
                        });
                    } else {
                        div.textContent = lyric.text;
                    }
                    container.appendChild(div);
                });
            }

            loop() {
                this.audioEngine.updateData();
                this.visualizer.draw(this.audioEngine);

                const time = this.audioEngine.audio.currentTime;
                const duration = this.audioEngine.audio.duration;

                if(duration) {
                    document.getElementById('progress-bar').style.width = `${(time/duration)*100}%`;
                    
                    // Formatting time signature
                    const m = Math.floor(time / 60), s = Math.floor(time % 60).toString().padStart(2, '0');
                    document.getElementById('time-current').textContent = `${m}:${s}`;
                }

                if (this.lyrics.length > 0) {
                    let newIndex = this.lyrics.findIndex(l => l.time > time) - 1;
                    if (newIndex === -2) newIndex = this.lyrics.length - 1;

                    if (newIndex !== this.currentLyricIndex && newIndex >= 0) {
                        if(this.currentLyricIndex >= 0) {
                            const oldEl = document.getElementById(`lyric-${this.currentLyricIndex}`);
                            if(oldEl) { oldEl.className = 'lyric-line past'; }
                        }
                        this.currentLyricIndex = newIndex;
                        const newEl = document.getElementById(`lyric-${this.currentLyricIndex}`);
                        if(newEl) { newEl.className = 'lyric-line active'; }
                    }

                    // Native parametric runtime injectors
                    if (this.currentLyricIndex >= 0) {
                        const currentLrc = this.lyrics[this.currentLyricIndex];
                        const delta = time - currentLrc.time;

                        if (this.mode === 'mode-karaoke') {
                            let pct = Math.min(100, Math.max(0, (delta / currentLrc.duration) * 100));
                            document.documentElement.style.setProperty('--karaoke-progress', `${pct}%`);
                        } 
                        else if (this.mode === 'mode-wave') {
                            const lineEl = document.getElementById(`lyric-${this.currentLyricIndex}`);
                            if (lineEl) {
                                this.waveTime += 0.04 + (this.audioEngine.treble / 1000);
                                const spans = lineEl.querySelectorAll('span');
                                spans.forEach((span, idx) => {
                                    // Complex dual sine wave interpolation matching structural audio frequencies
                                    let offset = Math.sin(this.waveTime + idx * 0.2) * (10 + (this.audioEngine.mid / 10));
                                    let opacity = Math.sin(this.waveTime + idx * 0.1) * 0.4 + 0.6;
                                    span.style.transform = `translateY(${offset}px)`;
                                    span.style.opacity = opacity;
                                });
                            }
                        }
                    }
                }
                requestAnimationFrame(this.loop);
            }
        }

        window.onload = () => new App();
    </script>
</body>
</html>
