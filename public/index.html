<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>JukeBox - Premium Audio Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Manrope:wght@200;300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
        }

        :root {
            --bg: #0a0e27;
            --bg-2: #141829;
            --bg-3: #1a1f3a;
            --text: #ffffff;
            --muted: #8b92b0;
            --accent: #00d9ff;
            --accent-2: #6366f1;
            --accent-3: #ec4899;
            --warm: #fbbf24;
            --danger: #ef4444;
            --shadow: rgba(0, 0, 0, 0.5);
            --bass: 0;
            --bloom: 0;
            --tilt-x: 0deg;
            --tilt-y: 0deg;
            --float-shift: 0px;
            --wave-offset: 0;
            --particle-opacity: 0.3;
        }

        body {
            position: relative;
            width: 100vw;
            height: 100dvh;
            background: linear-gradient(135deg, #0a0e27 0%, #141829 50%, #0f1420 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: brightness(1) contrast(1.1);
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }

        .content-area {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            perspective: 1200px;
        }

        .glass {
            background: rgba(20, 24, 41, 0.3);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        .visualizer-section {
            position: relative;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            min-height: 280px;
            width: 100%;
            max-width: 600px;
        }

        #speaker-canvas {
            max-width: 100%;
            max-height: 300px;
            filter: drop-shadow(0 0 20px rgba(0, 217, 255, calc(0.3 + var(--bloom) * 0.3)));
        }

        .lyrics-display {
            position: relative;
            z-index: 25;
            width: 90%;
            max-width: 900px;
            height: 200px;
            margin: 40px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        .lyrics-text {
            font-size: clamp(24px, 6vw, 72px);
            font-weight: 300;
            text-align: center;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: var(--text);
            filter: drop-shadow(0 0 10px rgba(0, 217, 255, calc(0.5 + var(--bloom))));
            will-change: transform, opacity, filter;
            transform: translateZ(0);
        }

        .lyrics-floating {
            animation: float-lyrics 3s ease-out infinite;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.6), 0 0 40px rgba(99, 102, 241, 0.3);
        }

        .lyrics-karaoke {
            background: linear-gradient(90deg, #00d9ff 0%, #6366f1 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(0, 217, 255, 0.6));
            animation: karaoke-pulse 1.5s ease-in-out infinite;
        }

        .lyrics-bd {
            transform: perspective(800px) rotateY(var(--tilt-x)) rotateX(var(--tilt-y));
            text-shadow: -2px 2px 0 #ec4899, -4px 4px 0 rgba(0, 0, 0, 0.3);
            font-weight: 700;
            animation: bd-slide 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .lyrics-neon {
            text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent), 0 0 30px var(--accent-2), 0 0 40px var(--accent-2);
            animation: neon-flicker 2s ease-in-out infinite;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .lyrics-wave {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .wave-char {
            display: inline-block;
            animation: wave-motion 0.8s ease-in-out infinite;
            animation-delay: calc(var(--index) * 50ms);
            margin: 0 2px;
            filter: drop-shadow(0 0 8px rgba(0, 217, 255, 0.5));
        }

        .lyrics-minimal {
            font-weight: 200;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: clamp(16px, 3vw, 32px);
            animation: minimal-fade 2s ease-in-out;
        }

        @keyframes float-lyrics {
            0%, 100% { transform: translateY(0) translateZ(20px) scaleY(1); opacity: 1; }
            50% { transform: translateY(-15px) translateZ(40px) scaleY(1.05); opacity: 0.9; }
        }

        @keyframes karaoke-pulse {
            0%, 100% { filter: drop-shadow(0 0 15px rgba(0, 217, 255, 0.6)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px rgba(0, 217, 255, 0.8)); transform: scale(1.02); }
        }

        @keyframes bd-slide {
            0% { transform: perspective(800px) rotateY(45deg) rotateX(20deg) translateX(50px); opacity: 0; }
            100% { transform: perspective(800px) rotateY(0deg) rotateX(0deg) translateX(0); opacity: 1; }
        }

        @keyframes neon-flicker {
            0%, 100% { text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent); }
            5% { text-shadow: 0 0 5px var(--accent); }
            10% { text-shadow: 0 0 20px var(--accent), 0 0 30px var(--accent-2); }
        }

        @keyframes wave-motion {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes minimal-fade {
            0% { opacity: 0; transform: scale(0.9); }
            50% { opacity: 1; }
            100% { opacity: 1; transform: scale(1); }
        }

        .controls-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 30;
            background: rgba(10, 14, 39, 0.4);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .controls-panel.hidden {
            transform: translateY(120%);
            opacity: 0;
            pointer-events: none;
        }

        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
            z-index: 35;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px var(--accent);
        }

        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(0, 217, 255, 0.2);
            border-color: rgba(0, 217, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: rgba(0, 217, 255, 0.2);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary:hover {
            background: rgba(0, 217, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
        }

        #file-upload, #lrc-upload {
            display: none;
        }

        .upload-area {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 40;
            display: flex;
            gap: 10px;
        }

        .mode-selector {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 40;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 200px;
        }

        .mode-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        .info-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            background: rgba(20, 24, 41, 0.3);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-display {
            font-feature-settings: "tnum";
            font-family: 'Space Grotesk', monospace;
        }

        @media (max-width: 768px) {
            .lyrics-display {
                height: 150px;
                margin: 20px 0;
            }

            .lyrics-text {
                font-size: clamp(18px, 5vw, 48px);
            }

            .visualizer-section {
                margin-bottom: 20px;
                min-height: 200px;
            }

            .mode-selector {
                top: 10px;
                left: 10px;
                max-width: 150px;
            }

            .upload-area {
                top: 10px;
                right: 10px;
                gap: 5px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 12px;
            }
        }

        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        .content-area, .controls-panel {
            -webkit-user-select: none;
            user-select: none;
        }

        * {
            scroll-behavior: smooth;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="background-canvas"></canvas>
    <div class="container">
        <div class="content-area">
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="floating">Floating</button>
                <button class="mode-btn" data-mode="karaoke">Karaoke</button>
                <button class="mode-btn" data-mode="bd">BD</button>
                <button class="mode-btn" data-mode="neon">Neon</button>
                <button class="mode-btn" data-mode="wave">Wave</button>
                <button class="mode-btn" data-mode="minimal">Minimal</button>
            </div>

            <div class="info-bar">
                <span class="time-display" id="time-display">0:00 / 0:00</span>
            </div>

            <div class="upload-area">
                <button class="btn" id="upload-audio-btn" title="Upload audio file">🎵 Audio</button>
                <button class="btn" id="upload-lrc-btn" title="Upload lyrics file">📝 Lyrics</button>
            </div>

            <div class="visualizer-section">
                <canvas id="speaker-canvas"></canvas>
            </div>

            <div class="lyrics-display">
                <div class="lyrics-text lyrics-floating" id="lyrics-text">Now playing...</div>
            </div>
        </div>
    </div>

    <div class="controls-panel" id="controls-panel">
        <button class="btn" id="play-btn" title="Play / Pause">▶ Play</button>
        <button class="btn" id="stop-btn" title="Stop">⏹ Stop</button>
        <input type="range" id="seek-slider" min="0" max="100" value="0" style="flex: 1; max-width: 300px; cursor: pointer;">
        <button class="btn" id="volume-btn" title="Mute">🔊</button>
        <input type="range" id="volume-slider" min="0" max="100" value="70" style="max-width: 100px; cursor: pointer;">
    </div>

    <div class="progress-bar" id="progress-bar"></div>

    <input type="file" id="file-upload" accept="audio/*">
    <input type="file" id="lrc-upload" accept=".lrc,.txt">

    <script>
        (() => {
            'use strict';

            // AnimationSystem - Handle frame-based animations
            class AnimationSystem {
                constructor(root) {
                    this.root = root;
                    this.callbacks = new Set();
                    this.pointer = { targetX: 0, targetY: 0, x: 0, y: 0 };
                    this.lastTime = performance.now();
                    this.prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
                    this.onFrame = this.onFrame.bind(this);
                    this.bindPointer();
                    requestAnimationFrame(this.onFrame);
                }

                bindPointer() {
                    const update = (clientX, clientY) => {
                        const x = clientX / Math.max(1, window.innerWidth);
                        const y = clientY / Math.max(1, window.innerHeight);
                        this.pointer.targetX = (x - 0.5) * 2;
                        this.pointer.targetY = (y - 0.5) * 2;
                    };
                    window.addEventListener('pointermove', (e) => update(e.clientX, e.clientY), { passive: true });
                    window.addEventListener('touchmove', (e) => {
                        const touch = e.touches?.[0];
                        if (touch) update(touch.clientX, touch.clientY);
                    }, { passive: true });
                }

                add(callback) {
                    this.callbacks.add(callback);
                    return () => this.callbacks.delete(callback);
                }

                onFrame(now) {
                    const dt = Math.min(0.05, Math.max(0.001, (now - this.lastTime) / 1000));
                    this.lastTime = now;
                    const smooth = this.prefersReducedMotion ? 0.12 : 0.06;
                    this.pointer.x = this.damp(this.pointer.x, this.pointer.targetX, 1 / smooth, dt);
                    this.pointer.y = this.damp(this.pointer.y, this.pointer.targetY, 1 / smooth, dt);
                    this.root.style.setProperty('--tilt-x', `${(-this.pointer.y * 7).toFixed(2)}deg`);
                    this.root.style.setProperty('--tilt-y', `${(this.pointer.x * 7).toFixed(2)}deg`);
                    this.callbacks.forEach((cb) => cb(dt, now));
                    requestAnimationFrame(this.onFrame);
                }

                damp(current, target, lambda, dt) {
                    return current + (target - current) * (1 - Math.exp(-lambda * dt));
                }
            }

            // AudioEngine - Web Audio API wrapper
            class AudioEngine {
                constructor() {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    this.context = ctx;
                    this.source = null;
                    this.analyser = ctx.createAnalyser();
                    this.analyser.fftSize = 256;
                    this.gainNode = ctx.createGain();
                    this.gainNode.connect(this.analyser);
                    this.analyser.connect(ctx.destination);
                    this.audio = new Audio();
                    this.audio.addEventListener('ended', () => this.stop());
                    this.isPlaying = false;
                    this.lyrics = [];
                    this.currentLyricIndex = 0;
                }

                loadAudio(file) {
                    if (this.source) this.source.stop();
                    this.audio.src = URL.createObjectURL(file);
                    this.audio.currentTime = 0;
                }

                loadLyrics(text) {
                    const lines = text.split('\n');
                    this.lyrics = lines
                        .map(line => {
                            const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                            return match ? {
                                time: parseInt(match[1]) * 60 + parseFloat(match[2]),
                                text: match[3].trim()
                            } : null;
                        })
                        .filter(Boolean)
                        .sort((a, b) => a.time - b.time);
                }

                play() {
                    if (this.context.state === 'suspended') this.context.resume();
                    this.audio.play();
                    this.isPlaying = true;
                }

                pause() {
                    this.audio.pause();
                    this.isPlaying = false;
                }

                stop() {
                    this.audio.pause();
                    this.audio.currentTime = 0;
                    this.isPlaying = false;
                }

                seek(percentage) {
                    this.audio.currentTime = (this.audio.duration || 0) * percentage;
                }

                setVolume(value) {
                    this.gainNode.gain.value = value;
                    this.audio.volume = value;
                }

                toggleMute() {
                    this.gainNode.gain.value = this.gainNode.gain.value > 0 ? 0 : 0.7;
                    this.audio.muted = !this.audio.muted;
                }

                getFrequencyData() {
                    const data = new Uint8Array(this.analyser.frequencyBinCount);
                    this.analyser.getByteFrequencyData(data);
                    return data;
                }

                getCurrentLyrics() {
                    const current = this.lyrics.find(l => Math.abs(l.time - this.audio.currentTime) < 0.5);
                    const next = this.lyrics.find(l => l.time > this.audio.currentTime);
                    return {
                        current: current?.text || '',
                        next: next?.text || ''
                    };
                }

                get currentTime() {
                    return this.audio.currentTime;
                }

                get duration() {
                    return this.audio.duration;
                }
            }

            // BackgroundRenderer - Canvas-based animated background
            class BackgroundRenderer {
                constructor(canvas) {
                    this.canvas = canvas;
                    this.ctx = canvas.getContext('2d');
                    this.time = 0;
                    this.particles = [];
                    this.nebulae = [];
                    this.initialize();
                    window.addEventListener('resize', () => this.resize());
                }

                initialize() {
                    this.resize();
                    this.createParticles();
                    this.createNebulae();
                }

                resize() {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                }

                createNebulae() {
                    this.nebulae = [
                        { x: 0.3, y: 0.3, radius: 400, color: [0, 217, 255, 0.15], speed: 0.0002 },
                        { x: 0.7, y: 0.2, radius: 350, color: [99, 102, 241, 0.12], speed: 0.00015 },
                        { x: 0.5, y: 0.7, radius: 300, color: [236, 72, 153, 0.1], speed: 0.0001 },
                    ];
                }

                createParticles() {
                    this.particles = Array.from({ length: 80 }, () => ({
                        x: Math.random() * this.canvas.width,
                        y: Math.random() * this.canvas.height,
                        vx: (Math.random() - 0.5) * 0.3,
                        vy: (Math.random() - 0.5) * 0.3,
                        size: Math.random() * 2 + 0.5,
                        opacity: Math.random() * 0.5 + 0.2,
                        depth: Math.random() * 3,
                    }));
                }

                renderNebulae(t) {
                    this.nebulae.forEach(nebula => {
                        const posX = this.canvas.width * nebula.x + Math.sin(t * nebula.speed) * 100;
                        const posY = this.canvas.height * nebula.y + Math.cos(t * nebula.speed * 0.7) * 100;
                        const gradient = this.ctx.createRadialGradient(posX, posY, 0, posX, posY, nebula.radius);
                        gradient.addColorStop(0, `rgba(${nebula.color[0]}, ${nebula.color[1]}, ${nebula.color[2]}, ${nebula.color[3]})`);
                        gradient.addColorStop(0.5, `rgba(${nebula.color[0]}, ${nebula.color[1]}, ${nebula.color[2]}, ${nebula.color[3] * 0.5})`);
                        gradient.addColorStop(1, `rgba(${nebula.color[0]}, ${nebula.color[1]}, ${nebula.color[2]}, 0)`);
                        this.ctx.fillStyle = gradient;
                        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    });
                }

                renderParticles() {
                    this.particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.opacity += (Math.sin(this.time * 0.01 + p.depth) - 0.5) * 0.001;
                        p.opacity = Math.max(0.1, Math.min(0.6, p.opacity));
                        if (p.x < 0) p.x = this.canvas.width;
                        if (p.x > this.canvas.width) p.x = 0;
                        if (p.y < 0) p.y = this.canvas.height;
                        if (p.y > this.canvas.height) p.y = 0;
                        this.ctx.fillStyle = `rgba(0, 217, 255, ${p.opacity})`;
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        this.ctx.fill();
                    });
                }

                render(audioData) {
                    this.ctx.fillStyle = 'rgba(10, 14, 39, 0.2)';
                    this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    this.renderNebulae(this.time);
                    this.renderParticles();
                    const bassIntensity = audioData?.[0] || 0;
                    if (bassIntensity > 0.3) {
                        const gradient = this.ctx.createRadialGradient(
                            this.canvas.width / 2, this.canvas.height / 2, 0,
                            this.canvas.width / 2, this.canvas.height / 2,
                            Math.max(this.canvas.width, this.canvas.height)
                        );
                        gradient.addColorStop(0, `rgba(0, 217, 255, ${bassIntensity * 0.1})`);
                        gradient.addColorStop(1, 'rgba(0, 217, 255, 0)');
                        this.ctx.fillStyle = gradient;
                        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    }
                    this.time++;
                }
            }

            // SpeakerVisualizer - Bass-responsive speaker animation
            class SpeakerVisualizer {
                constructor(canvas, audioEngine) {
                    this.canvas = canvas;
                    this.ctx = canvas.getContext('2d');
                    this.audioEngine = audioEngine;
                    this.time = 0;
                    this.haloScale = 1;
                    this.breatheScale = 1;
                    this.initialize();
                    window.addEventListener('resize', () => this.resize());
                }

                initialize() {
                    this.resize();
                }

                resize() {
                    this.canvas.width = Math.min(500, window.innerWidth - 40);
                    this.canvas.height = 280;
                }

                render(frequency) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    const centerX = this.canvas.width / 2;
                    const centerY = this.canvas.height / 2;
                    const bassFreq = frequency.slice(0, 8).reduce((a, b) => a + b, 0) / 8 / 255;
                    const midFreq = frequency.slice(8, 64).reduce((a, b) => a + b, 0) / 56 / 255;
                    this.breatheScale += (0.8 + bassFreq - this.breatheScale) * 0.1;
                    this.haloScale += (1 + midFreq * 0.5 - this.haloScale) * 0.08;

                    // Draw halos
                    for (let i = 3; i > 0; i--) {
                        const haloRadius = 80 * i * this.haloScale;
                        const haloOpacity = (0.3 - i * 0.08) * (0.5 + bassFreq);
                        this.ctx.strokeStyle = `rgba(0, 217, 255, ${haloOpacity})`;
                        this.ctx.lineWidth = 2;
                        this.ctx.beginPath();
                        this.ctx.arc(centerX, centerY, haloRadius, 0, Math.PI * 2);
                        this.ctx.stroke();
                    }

                    // Draw speaker cone
                    this.ctx.fillStyle = `rgba(0, 217, 255, 0.15)`;
                    this.ctx.beginPath();
                    this.ctx.arc(centerX, centerY, 60 * this.breatheScale, 0, Math.PI * 2);
                    this.ctx.fill();

                    this.ctx.strokeStyle = `rgba(0, 217, 255, 0.4)`;
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.arc(centerX, centerY, 60 * this.breatheScale, 0, Math.PI * 2);
                    this.ctx.stroke();

                    // Draw frequency bars
                    const barCount = 32;
                    const barWidth = (this.canvas.width - 60) / barCount;
                    const startX = 30;

                    for (let i = 0; i < barCount; i++) {
                        const value = frequency[Math.floor(i * frequency.length / barCount)] / 255;
                        const barHeight = value * 100 * (1 + bassFreq * 0.3);
                        const x = startX + i * barWidth;
                        const y = centerY + 80;
                        this.ctx.shadowColor = `rgba(0, 217, 255, ${value * 0.5})`;
                        this.ctx.shadowBlur = 10 + value * 10;
                        this.ctx.fillStyle = `rgba(0, 217, 255, ${0.3 + value * 0.7})`;
                        this.ctx.fillRect(x, y - barHeight, barWidth * 0.8, barHeight);
                    }
                    this.ctx.shadowColor = 'rgba(0, 0, 0, 0)';
                    this.time++;
                }
            }

            // LyricsRenderer - Multi-mode lyrics display
            class LyricsRenderer {
                constructor() {
                    this.currentLine = '';
                    this.nextLine = '';
                    this.mode = 'floating';
                    this.time = 0;
                    this.animationPhase = 0;
                    this.wavePulse = 0;
                }

                setMode(mode) {
                    this.mode = mode;
                    this.animationPhase = 0;
                }

                setLyrics(current, next) {
                    if (current !== this.currentLine) {
                        this.currentLine = current;
                        this.animationPhase = 0;
                    }
                    this.nextLine = next;
                }

                updateFloating() {
                    this.animationPhase = Math.min(1, this.animationPhase + 0.02);
                    const ease = (t) => {
                        if (t < 0.3) return (t / 0.3) * (t / 0.3);
                        if (t < 0.6) return 1 - Math.pow((t - 0.3) / 0.3, 2) * 0.3;
                        return 1;
                    };
                    return ease(this.animationPhase);
                }

                render(element) {
                    if (!element) return;
                    element.classList.remove('lyrics-floating', 'lyrics-karaoke', 'lyrics-bd', 'lyrics-neon', 'lyrics-wave', 'lyrics-minimal');
                    element.classList.add(`lyrics-${this.mode}`);

                    switch (this.mode) {
                        case 'floating':
                            element.style.opacity = this.updateFloating();
                            element.style.filter = `blur(${5 - this.animationPhase * 5}px) drop-shadow(0 0 ${10 + this.animationPhase * 10}px rgba(0, 217, 255, ${0.5 + this.animationPhase * 0.3}))`;
                            break;
                        case 'karaoke':
                            element.style.filter = `drop-shadow(0 0 ${10 + Math.sin(this.time * 0.05) * 5}px rgba(0, 217, 255, 0.6))`;
                            break;
                        case 'bd':
                            const rotX = Math.sin(this.time * 0.02) * 5;
                            const rotY = Math.cos(this.time * 0.02) * 5;
                            element.style.transform = `perspective(800px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
                            break;
                        case 'neon':
                            const flicker = Math.random() > 0.95 ? -3 : 0;
                            element.style.filter = `brightness(${1 + flicker * 0.1}) drop-shadow(0 0 ${15 + flicker}px rgba(0, 217, 255, 0.8))`;
                            break;
                        case 'wave':
                            this.renderWaveMode(element);
                            break;
                        case 'minimal':
                            element.style.opacity = 1;
                            element.style.filter = 'none';
                            break;
                    }
                    if (this.mode !== 'wave') element.textContent = this.currentLine;
                    this.time++;
                }

                renderWaveMode(element) {
                    this.wavePulse += 0.05;
                    const chars = this.currentLine.split('');
                    element.innerHTML = chars.map((char, i) => {
                        const offset = Math.sin(this.wavePulse + i * 0.3) * 20;
                        const opacity = 0.7 + Math.sin(this.wavePulse + i * 0.2) * 0.3;
                        return `<span class="wave-char" style="--index: ${i}; transform: translateY(${offset}px); opacity: ${opacity};">${char}</span>`;
                    }).join('');
                }
            }

            // ControlsManager - File handling and UI management
            class ControlsManager {
                constructor(audioEngine, lyricsRenderer) {
                    this.audioEngine = audioEngine;
                    this.lyricsRenderer = lyricsRenderer;
                }

                handleFileUpload(file) {
                    if (!file) return;
                    this.audioEngine.loadAudio(file);
                }

                handleLrcUpload(file) {
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        this.audioEngine.loadLyrics(e.target.result);
                    };
                    reader.readAsText(file);
                }

                handleLrcPaste(text) {
                    this.audioEngine.loadLyrics(text);
                }
            }

            // Initialize all systems
            window.addEventListener('DOMContentLoaded', async () => {
                const audioEngine = new AudioEngine();
                const animationSystem = new AnimationSystem(document.documentElement);
                const backgroundCanvas = document.getElementById('background-canvas');
                const backgroundRenderer = new BackgroundRenderer(backgroundCanvas);
                const speakerCanvas = document.getElementById('speaker-canvas');
                const speakerVisualizer = new SpeakerVisualizer(speakerCanvas, audioEngine);
                const lyricsRenderer = new LyricsRenderer();
                const controlsManager = new ControlsManager(audioEngine, lyricsRenderer);

                // Mode switching
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        const mode = e.target.dataset.mode;
                        lyricsRenderer.setMode(mode);
                    });
                });

                // Wake Lock API
                let wakeLock = null;
                const requestWakeLock = async () => {
                    try {
                        wakeLock = await navigator.wakeLock?.request('screen');
                    } catch (err) {
                        console.log('Wake Lock not available');
                    }
                };

                const releaseWakeLock = async () => {
                    if (wakeLock) {
                        await wakeLock.release();
                        wakeLock = null;
                    }
                };

                // Main animation loop
                const animate = () => {
                    requestAnimationFrame(animate);
                    const frequency = audioEngine.getFrequencyData();
                    backgroundRenderer.render(frequency);
                    speakerVisualizer.render(frequency);
                    const { current, next } = audioEngine.getCurrentLyrics();
                    lyricsRenderer.setLyrics(current, next);
                    lyricsRenderer.render(document.getElementById('lyrics-text'));
                    const progressPercent = (audioEngine.currentTime / audioEngine.duration) * 100 || 0;
                    document.getElementById('progress-bar').style.width = progressPercent + '%';
                    const formatTime = (ms) => {
                        const s = Math.floor(ms / 1000);
                        return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
                    };
                    document.getElementById('time-display').textContent = formatTime(audioEngine.currentTime) + ' / ' + formatTime(audioEngine.duration);
                    const controlsPanel = document.getElementById('controls-panel');
                    if (audioEngine.isPlaying && audioEngine.duration > 0) {
                        if (!controlsPanel.classList.contains('hidden')) {
                            setTimeout(() => controlsPanel.classList.add('hidden'), 3000);
                        }
                    } else {
                        controlsPanel.classList.remove('hidden');
                    }
                    const bassEnergy = frequency[0] / 255;
                    document.documentElement.style.setProperty('--bass', bassEnergy);
                    document.documentElement.style.setProperty('--bloom', Math.sin(performance.now() / 1000) * 0.5 + 0.5);
                };
                animate();

                // Control listeners
                document.getElementById('play-btn').addEventListener('click', () => {
                    audioEngine.isPlaying ? audioEngine.pause() : audioEngine.play();
                    document.getElementById('play-btn').textContent = audioEngine.isPlaying ? '⏸ Pause' : '▶ Play';
                    if (audioEngine.isPlaying) requestWakeLock();
                    else releaseWakeLock();
                });

                document.getElementById('stop-btn').addEventListener('click', () => {
                    audioEngine.stop();
                    releaseWakeLock();
                    document.getElementById('play-btn').textContent = '▶ Play';
                });

                document.getElementById('seek-slider').addEventListener('input', (e) => {
                    audioEngine.seek(parseFloat(e.target.value) / 100);
                });

                document.getElementById('volume-slider').addEventListener('input', (e) => {
                    audioEngine.setVolume(parseFloat(e.target.value) / 100);
                });

                document.getElementById('volume-btn').addEventListener('click', () => {
                    audioEngine.toggleMute();
                });

                document.getElementById('upload-audio-btn').addEventListener('click', () => {
                    document.getElementById('file-upload').click();
                });

                document.getElementById('upload-lrc-btn').addEventListener('click', () => {
                    document.getElementById('lrc-upload').click();
                });

                document.getElementById('file-upload').addEventListener('change', (e) => {
                    controlsManager.handleFileUpload(e.files[0]);
                });

                document.getElementById('lrc-upload').addEventListener('change', (e) => {
                    controlsManager.handleLrcUpload(e.files[0]);
                });

                // Drag and drop
                document.addEventListener('dragover', (e) => e.preventDefault());
                document.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const files = e.dataTransfer.files;
                    Array.from(files).forEach(file => {
                        if (file.type.includes('audio')) {
                            controlsManager.handleFileUpload(file);
                        } else if (file.name.endsWith('.lrc')) {
                            controlsManager.handleLrcUpload(file);
                        }
                    });
                });

                // Touch to show controls
                let touchTimeout;
                document.addEventListener('touchstart', () => {
                    document.getElementById('controls-panel').classList.remove('hidden');
                    clearTimeout(touchTimeout);
                    touchTimeout = setTimeout(() => {
                        if (audioEngine.isPlaying) {
                            document.getElementById('controls-panel').classList.add('hidden');
                        }
                    }, 5000);
                });

                // Paste lyrics
                document.addEventListener('paste', (e) => {
                    const text = e.clipboardData.getData('text');
                    if (text.includes('\n') || text.includes('[')) {
                        controlsManager.handleLrcPaste(text);
                    }
                });
            });
        })();
    </script>
</body>
