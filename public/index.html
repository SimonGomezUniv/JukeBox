<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>JukeBox - Premium Audio Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&family=Manrope:wght@200;300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
        }

        /* CSS Variables - Premium Palette */
        :root {
            --bg: #0a0e27;
            --bg-2: #141829;
            --bg-3: #1a1f3a;
            --text: #ffffff;
            --muted: #8b92b0;
            --accent: #00d9ff;
            --accent-2: #6366f1;
            --accent-3: #ec4899;
            --warm: #fbbf24;
            --danger: #ef4444;
            --shadow: rgba(0, 0, 0, 0.5);
            --bass: 0;
            --bloom: 0;
            --tilt-x: 0deg;
            --tilt-y: 0deg;
            --float-shift: 0px;
            --wave-offset: 0;
            --particle-opacity: 0.3;
        }

        body {
            position: relative;
            width: 100vw;
            height: 100dvh;
            background: linear-gradient(135deg, #0a0e27 0%, #141829 50%, #0f1420 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Background Canvas - Animated Nebula */
        #background-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            filter: brightness(1) contrast(1.1);
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }

        /* Main Content Area */
        .content-area {
            position: relative;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
            perspective: 1200px;
        }

        /* Glassmorphism Base */
        .glass {
            background: rgba(20, 24, 41, 0.3);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.3),
                inset 0 1px 1px rgba(255, 255, 255, 0.2),
                inset 0 -1px 1px rgba(0, 0, 0, 0.2);
        }

        /* Speaker Visualizer Container */
        .visualizer-section {
            position: relative;
            z-index: 25;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
            min-height: 280px;
            width: 100%;
            max-width: 600px;
        }

        #speaker-canvas {
            max-width: 100%;
            max-height: 300px;
            filter: drop-shadow(0 0 20px rgba(0, 217, 255, calc(0.3 + var(--bloom) * 0.3)));
        }

        /* Lyrics Display */
        .lyrics-display {
            position: relative;
            z-index: 25;
            width: 90%;
            max-width: 900px;
            height: 200px;
            margin: 40px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        .lyrics-text {
            font-size: clamp(24px, 6vw, 72px);
            font-weight: 300;
            text-align: center;
            letter-spacing: -0.02em;
            line-height: 1.2;
            color: var(--text);
            filter: drop-shadow(0 0 10px rgba(0, 217, 255, calc(0.5 + var(--bloom))));
            will-change: transform, opacity, filter;
            transform: translateZ(0);
        }

        /* Mode-specific lyric styles */
        .lyrics-floating {
            animation: float-lyrics 3s ease-out infinite;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.6), 0 0 40px rgba(99, 102, 241, 0.3);
        }

        .lyrics-karaoke {
            background: linear-gradient(90deg, #00d9ff 0%, #6366f1 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 15px rgba(0, 217, 255, 0.6));
            animation: karaoke-pulse 1.5s ease-in-out infinite;
        }

        .lyrics-bd {
            transform: perspective(800px) rotateY(var(--tilt-x)) rotateX(var(--tilt-y));
            text-shadow: -2px 2px 0 #ec4899, -4px 4px 0 rgba(0, 0, 0, 0.3);
            font-weight: 700;
            animation: bd-slide 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .lyrics-neon {
            text-shadow: 
                0 0 10px var(--accent),
                0 0 20px var(--accent),
                0 0 30px var(--accent-2),
                0 0 40px var(--accent-2);
            animation: neon-flicker 2s ease-in-out infinite;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .lyrics-wave {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .wave-char {
            display: inline-block;
            animation: wave-motion 0.8s ease-in-out infinite;
            animation-delay: calc(var(--index) * 50ms);
            margin: 0 2px;
            filter: drop-shadow(0 0 8px rgba(0, 217, 255, 0.5));
        }

        .lyrics-minimal {
            font-weight: 200;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-size: clamp(16px, 3vw, 32px);
            animation: minimal-fade 2s ease-in-out;
        }

        /* Animations */
        @keyframes float-lyrics {
            0%, 100% {
                transform: translateY(0) translateZ(20px) scaleY(1);
                opacity: 1;
            }
            50% {
                transform: translateY(-15px) translateZ(40px) scaleY(1.05);
                opacity: 0.9;
            }
        }

        @keyframes karaoke-pulse {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(0, 217, 255, 0.6));
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 25px rgba(0, 217, 255, 0.8));
                transform: scale(1.02);
            }
        }

        @keyframes bd-slide {
            0% {
                transform: perspective(800px) rotateY(45deg) rotateX(20deg) translateX(50px);
                opacity: 0;
            }
            100% {
                transform: perspective(800px) rotateY(0deg) rotateX(0deg) translateX(0);
                opacity: 1;
            }
        }

        @keyframes neon-flicker {
            0%, 100% {
                text-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent);
            }
            5% {
                text-shadow: 0 0 5px var(--accent);
            }
            10% {
                text-shadow: 0 0 20px var(--accent), 0 0 30px var(--accent-2);
            }
        }

        @keyframes wave-motion {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        @keyframes minimal-fade {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Controls Panel */
        .controls-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 30;
            background: rgba(10, 14, 39, 0.4);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .controls-panel.hidden {
            transform: translateY(120%);
            opacity: 0;
            pointer-events: none;
        }

        /* Progress Bar */
        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
            z-index: 35;
            transition: width 0.1s linear;
            box-shadow: 0 0 15px var(--accent);
        }

        /* Control Buttons */
        .btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn:hover {
            background: rgba(0, 217, 255, 0.2);
            border-color: rgba(0, 217, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 217, 255, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: rgba(0, 217, 255, 0.2);
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-primary:hover {
            background: rgba(0, 217, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.4);
        }

        /* File Upload */
        #file-upload, #lrc-upload {
            display: none;
        }

        .upload-area {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 40;
            display: flex;
            gap: 10px;
        }

        /* Mode Selector */
        .mode-selector {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 40;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 200px;
        }

        .mode-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mode-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }

        /* Info Display */
        .info-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            background: rgba(20, 24, 41, 0.3);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 12px;
            color: var(--muted);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-display {
            font-feature-settings: "tnum";
            font-family: 'Space Grotesk', monospace;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .lyrics-display {
                height: 150px;
                margin: 20px 0;
            }

            .lyrics-text {
                font-size: clamp(18px, 5vw, 48px);
            }

            .visualizer-section {
                margin-bottom: 20px;
                min-height: 200px;
            }

            .mode-selector {
                top: 10px;
                left: 10px;
                max-width: 150px;
            }

            .upload-area {
                top: 10px;
                right: 10px;
                gap: 5px;
            }

            .btn {
                padding: 8px 12px;
                font-size: 12px;
            }
        }

        /* Canvas for speaker visualization */
        canvas {
            max-width: 100%;
            height: auto;
            display: block;
        }

        /* Prevent text selection */
        .content-area, .controls-panel {
            -webkit-user-select: none;
            user-select: none;
        }

        /* Smooth scrolling */
        * {
            scroll-behavior: smooth;
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Background Canvas -->
    <canvas id="background-canvas"></canvas>

    <!-- Main Container -->
    <div class="container">
        <div class="content-area">
            <!-- Mode Selector -->
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="floating">Floating</button>
                <button class="mode-btn" data-mode="karaoke">Karaoke</button>
                <button class="mode-btn" data-mode="bd">BD</button>
                <button class="mode-btn" data-mode="neon">Neon</button>
                <button class="mode-btn" data-mode="wave">Wave</button>
                <button class="mode-btn" data-mode="minimal">Minimal</button>
            </div>

            <!-- Info Bar -->
            <div class="info-bar">
                <span class="time-display" id="time-display">0:00 / 0:00</span>
            </div>

            <!-- Upload Area -->
            <div class="upload-area">
                <button class="btn" id="upload-audio-btn" title="Upload audio file">🎵 Audio</button>
                <button class="btn" id="upload-lrc-btn" title="Upload lyrics file">📝 Lyrics</button>
            </div>

            <!-- Visualizer Section -->
            <div class="visualizer-section">
                <canvas id="speaker-canvas"></canvas>
            </div>

            <!-- Lyrics Display -->
            <div class="lyrics-display">
                <div class="lyrics-text lyrics-floating" id="lyrics-text">
                    Now playing...
                </div>
            </div>
        </div>
    </div>

    <!-- Controls Panel -->
    <div class="controls-panel" id="controls-panel">
        <button class="btn" id="play-btn" title="Play / Pause">▶ Play</button>
        <button class="btn" id="stop-btn" title="Stop">⏹ Stop</button>
        <input type="range" id="seek-slider" min="0" max="100" value="0" style="flex: 1; max-width: 300px; cursor: pointer;">
        <button class="btn" id="volume-btn" title="Mute">🔊</button>
        <input type="range" id="volume-slider" min="0" max="100" value="70" style="max-width: 100px; cursor: pointer;">
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar" id="progress-bar"></div>

    <!-- File Input -->
    <input type="file" id="file-upload" accept="audio/*">
    <input type="file" id="lrc-upload" accept=".lrc,.txt">

    <script>

(() => {
  'use strict';

  class AnimationSystem {
    constructor(root) {
      this.root = root;
      this.callbacks = new Set();
      this.pointer = { targetX: 0, targetY: 0, x: 0, y: 0 };
      this.lastTime = performance.now();
      this.prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      this.onFrame = this.onFrame.bind(this);
      this.bindPointer();
      requestAnimationFrame(this.onFrame);
    }

    bindPointer() {
      const update = (clientX, clientY) => {
        const x = clientX / Math.max(1, window.innerWidth);
        const y = clientY / Math.max(1, window.innerHeight);
        this.pointer.targetX = (x - 0.5) * 2;
        this.pointer.targetY = (y - 0.5) * 2;
      };

      window.addEventListener('pointermove', (event) => update(event.clientX, event.clientY), { passive: true });
      window.addEventListener('touchmove', (event) => {
        const touch = event.touches && event.touches[0];
        if (touch) update(touch.clientX, touch.clientY);
      }, { passive: true });
    }

    add(callback) {
      this.callbacks.add(callback);
      return () => this.callbacks.delete(callback);
    }

    onFrame(now) {
      const dt = Math.min(0.05, Math.max(0.001, (now - this.lastTime) / 1000));
      this.lastTime = now;
      const smooth = this.prefersReducedMotion ? 0.12 : 0.06;
      this.pointer.x = this.damp(this.pointer.x, this.pointer.targetX, 1 / smooth, dt);
      this.pointer.y = this.damp(this.pointer.y, this.pointer.targetY, 1 / smooth, dt);
      this.root.style.setProperty('--tilt-x', `${(-this.pointer.y * 7).toFixed(2)}deg`);
      this.root.style.setProperty('--tilt-y', `${(this.pointer.x * 7).toFixed(2)}deg`);
      this.callbacks.forEach((callback) => callback(dt, now));
      requestAnimationFrame(this.onFrame);
    }

    clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    damp(current, target, lambda, dt) {
      return current + (target - current) * (1 - Math.exp(-lambda * dt));
    }

    map(value, inMin, inMax, outMin, outMax) {
      const safe = inMax - inMin || 1;
      const t = this.clamp((value - inMin) / safe, 0, 1);
      return outMin + (outMax - outMin) * t;
    }
  }

  class AudioEngine {
    constructor(audioElement, animationSystem) {
      this.audio = audioElement;
      this.animation = animationSystem;
      this.context = null;
      this.source = null;
      this.analyser = null;
      this.frequencyData = null;
      this.waveformData = null;
      this.metrics = {
        bass: 0,
        mid: 0,
        treble: 0,
        overall: 0,
        pulse: 0,
        waveform: [],
        playing: false,
        progress: 0
      };
    }

    ensureGraph() {
      if (this.context) return;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      this.context = new AudioContextClass();
      this.source = this.context.createMediaElementSource(this.audio);
      this.analyser = this.context.createAnalyser();
      this.analyser.fftSize = 256;
      this.analyser.smoothingTimeConstant = 0.86;
      this.frequencyData = new Uint8Array(this.analyser.frequencyBinCount);
      this.waveformData = new Uint8Array(this.analyser.fftSize);
      this.source.connect(this.analyser);
      this.analyser.connect(this.context.destination);
    }

    async togglePlayback() {
      if (!this.audio.src) return false;
      this.ensureGraph();
      if (this.context && this.context.state === 'suspended') {
        await this.context.resume();
      }
      if (this.audio.paused) {
        await this.audio.play();
      } else {
        this.audio.pause();
      }
      return true;
    }

    seek(time) {
      if (!Number.isFinite(this.audio.duration)) return;
      this.audio.currentTime = this.animation.clamp(time, 0, this.audio.duration || 0);
    }

    setVolume(value) {
      this.audio.volume = this.animation.clamp(parseFloat(value) || 0, 0, 1);
    }

    sample(dt, now) {
      let bassTarget = 0.02;
      let midTarget = 0.02;
      let trebleTarget = 0.02;
      let overallTarget = 0.03;

      if (this.analyser && this.frequencyData) {
        this.analyser.getByteFrequencyData(this.frequencyData);
        this.analyser.getByteTimeDomainData(this.waveformData);

        const low = this.averageRange(0, 8) / 255;
        const mid = this.averageRange(8, 28) / 255;
        const high = this.averageRange(28, this.frequencyData.length) / 255;
        const all = this.averageRange(0, this.frequencyData.length) / 255;

        bassTarget = low;
        midTarget = mid;
        trebleTarget = high;
        overallTarget = all;
      } else {
        const idle = this.audio.paused ? 0.04 : 0.08;
        bassTarget = idle + Math.sin(now * 0.0012) * 0.015;
        midTarget = idle + Math.sin(now * 0.0011 + 1) * 0.01;
        trebleTarget = idle + Math.cos(now * 0.0014) * 0.01;
        overallTarget = idle;
      }

      this.metrics.bass = this.animation.damp(this.metrics.bass, bassTarget, 8, dt);
      this.metrics.mid = this.animation.damp(this.metrics.mid, midTarget, 7, dt);
      this.metrics.treble = this.animation.damp(this.metrics.treble, trebleTarget, 7, dt);
      this.metrics.overall = this.animation.damp(this.metrics.overall, overallTarget, 8, dt);
      this.metrics.pulse = this.animation.damp(this.metrics.pulse, Math.max(this.metrics.bass, this.metrics.overall * 0.7), 10, dt);
      this.metrics.playing = !this.audio.paused;
      this.metrics.progress = this.audio.duration ? this.audio.currentTime / this.audio.duration : 0;
      this.metrics.waveform = this.waveformData || [];
      document.documentElement.style.setProperty('--bass', this.metrics.pulse.toFixed(3));
      document.documentElement.style.setProperty('--bloom', (0.18 + this.metrics.pulse * 0.5).toFixed(3));
      return this.metrics;
    }

    averageRange(start, end) {
      if (!this.frequencyData) return 0;
      const safeEnd = Math.max(start + 1, end);
      let sum = 0;
      for (let i = start; i < safeEnd; i += 1) sum += this.frequencyData[i] || 0;
      return sum / (safeEnd - start || 1);
    }
  }

  class ParticleSystem {
    constructor(count = 80) {
      this.particles = Array.from({ length: count }, () => ({
        x: Math.random(),
        y: Math.random(),
        depth: 0.3 + Math.random() * 1.8,
        radius: 0.8 + Math.random() * 2.8,
        alpha: 0.08 + Math.random() * 0.22,
        speed: 0.2 + Math.random() * 0.8,
        phase: Math.random() * Math.PI * 2,
        hue: Math.random() > 0.55 ? '154,215,255' : Math.random() > 0.45 ? '213,193,255' : '255,180,145'
      }));
    }

    render(ctx, width, height, now, bass, pointerX, pointerY) {
      for (const particle of this.particles) {
        const drift = now * 0.00001 * particle.speed;
        const x = ((particle.x + drift / particle.depth + pointerX * 0.01 / particle.depth) % 1 + 1) % 1;
        const y = ((particle.y + Math.sin(now * 0.00025 * particle.speed + particle.phase) * 0.02 + pointerY * 0.01 / particle.depth) % 1 + 1) % 1;
        const px = x * width;
        const py = y * height;
        const radius = particle.radius * (1 + bass * 0.9) * particle.depth;
        const alpha = particle.alpha * (0.8 + bass * 1.2);
        const gradient = ctx.createRadialGradient(px, py, 0, px, py, radius * 8);
        gradient.addColorStop(0, `rgba(${particle.hue},${alpha})`);
        gradient.addColorStop(1, `rgba(${particle.hue},0)`);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(px, py, radius * 8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  class BackgroundRenderer {
    constructor(canvas, animationSystem, particleSystem) {
      this.canvas = canvas;
      this.ctx = canvas.getContext('2d');
      this.animation = animationSystem;
      this.particles = particleSystem;
      this.dpr = 1;
      this.resize = this.resize.bind(this);
      window.addEventListener('resize', this.resize);
      this.resize();
    }

    resize() {
      this.dpr = Math.min(window.devicePixelRatio || 1, 2);
      this.canvas.width = Math.max(1, Math.floor(window.innerWidth * this.dpr));
      this.canvas.height = Math.max(1, Math.floor(window.innerHeight * this.dpr));
      this.canvas.style.width = `${window.innerWidth}px`;
      this.canvas.style.height = `${window.innerHeight}px`;
    }

    render(now, metrics) {
      const ctx = this.ctx;
      const width = this.canvas.width;
      const height = this.canvas.height;
      const px = this.animation.pointer.x;
      const py = this.animation.pointer.y;

      ctx.clearRect(0, 0, width, height);

      const baseGradient = ctx.createLinearGradient(0, 0, width, height);
      baseGradient.addColorStop(0, '#04070c');
      baseGradient.addColorStop(0.42, '#08111d');
      baseGradient.addColorStop(1, '#04060a');
      ctx.fillStyle = baseGradient;
      ctx.fillRect(0, 0, width, height);

      this.drawNebula(ctx, width, height, now, metrics, px, py);
      this.drawGodRays(ctx, width, height, now, metrics, px, py);
      this.particles.render(ctx, width, height, now, metrics.pulse, px, py);
      this.drawHalos(ctx, width, height, now, metrics, px, py);
    }

    drawNebula(ctx, width, height, now, metrics, px, py) {
      const blobs = [
        { x: 0.18, y: 0.18, radius: 0.36, color: '154,215,255', speed: 0.00003, phase: 0.2 },
        { x: 0.82, y: 0.22, radius: 0.32, color: '213,193,255', speed: 0.000026, phase: 1.4 },
        { x: 0.62, y: 0.78, radius: 0.42, color: '255,180,145', speed: 0.00002, phase: 2.2 },
        { x: 0.28, y: 0.68, radius: 0.3, color: '139,244,199', speed: 0.000018, phase: 3.1 }
      ];

      blobs.forEach((blob, index) => {
        const wobbleX = Math.sin(now * blob.speed + blob.phase) * 0.08 + px * 0.02 * (index + 1);
        const wobbleY = Math.cos(now * blob.speed * 1.6 + blob.phase) * 0.08 + py * 0.02 * (index + 1);
        const x = (blob.x + wobbleX) * width;
        const y = (blob.y + wobbleY) * height;
        const radius = blob.radius * Math.min(width, height) * (1 + metrics.pulse * 0.35);
        const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
        gradient.addColorStop(0, `rgba(${blob.color},${0.18 + metrics.pulse * 0.14})`);
        gradient.addColorStop(0.35, `rgba(${blob.color},${0.08 + metrics.overall * 0.1})`);
        gradient.addColorStop(1, `rgba(${blob.color},0)`);
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    drawGodRays(ctx, width, height, now, metrics, px, py) {
      ctx.save();
      ctx.globalCompositeOperation = 'screen';
      const originX = width * (0.5 + px * 0.04);
      const originY = height * (0.48 + py * 0.04);
      const rayCount = 4;
      for (let i = 0; i < rayCount; i += 1) {
        const angle = -1.2 + i * 0.8 + Math.sin(now * 0.00008 + i) * 0.18;
        const length = height * (0.55 + i * 0.05);
        const spread = width * (0.06 + i * 0.02 + metrics.pulse * 0.06);
        const gradient = ctx.createLinearGradient(originX, originY, originX + Math.cos(angle) * length, originY + Math.sin(angle) * length);
        gradient.addColorStop(0, `rgba(255,255,255,${0.035 + metrics.pulse * 0.03})`);
        gradient.addColorStop(0.25, `rgba(154,215,255,${0.05 + metrics.pulse * 0.05})`);
        gradient.addColorStop(1, 'rgba(154,215,255,0)');
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.moveTo(originX, originY);
        ctx.lineTo(originX + Math.cos(angle - 0.06) * length + spread, originY + Math.sin(angle - 0.06) * length);
        ctx.lineTo(originX + Math.cos(angle + 0.06) * length - spread, originY + Math.sin(angle + 0.06) * length);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    drawHalos(ctx, width, height, now, metrics, px, py) {
      const gradient = ctx.createRadialGradient(
        width * (0.5 + px * 0.02),
        height * (0.5 + py * 0.02),
        0,
        width * 0.5,
        height * 0.5,
        Math.min(width, height) * (0.48 + metrics.pulse * 0.1)
      );
      gradient.addColorStop(0, `rgba(255,255,255,${0.04 + metrics.pulse * 0.04})`);
      gradient.addColorStop(0.36, `rgba(154,215,255,${0.05 + metrics.pulse * 0.06})`);
      gradient.addColorStop(0.7, 'rgba(213,193,255,0.04)');
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      ctx.save();
      ctx.globalAlpha = 0.08 + metrics.pulse * 0.08;
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1.1 * this.dpr;
      for (let i = 0; i < 3; i += 1) {
        const radius = Math.min(width, height) * (0.22 + i * 0.14 + metrics.pulse * 0.02);
        ctx.beginPath();
        ctx.ellipse(width * 0.5, height * (0.5 + i * 0.02), radius, radius * (0.7 + i * 0.05), now * 0.00005 + i * 0.2, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  class SpeakerVisualizer {
    constructor(options, animationSystem) {
      this.canvas = options.canvas;
      this.ctx = this.canvas.getContext('2d');
      this.shell = options.shell;
      this.scene = options.scene;
      this.membrane = options.membrane;
      this.cap = options.cap;
      this.animation = animationSystem;
      this.dpr = 1;
      this.resize = this.resize.bind(this);
      window.addEventListener('resize', this.resize);
      this.resize();
    }

    resize() {
      const rect = this.canvas.getBoundingClientRect();
      this.dpr = Math.min(window.devicePixelRatio || 1, 2);
      this.canvas.width = Math.max(1, Math.floor(rect.width * this.dpr));
      this.canvas.height = Math.max(1, Math.floor(rect.height * this.dpr));
    }

    render(now, metrics) {
      const breath = metrics.pulse;
      const px = this.animation.pointer.x;
      const py = this.animation.pointer.y;
      const slowYaw = Math.sin(now * 0.00011) * 5;
      const slowPitch = Math.cos(now * 0.00009) * 4;
      const floatY = Math.sin(now * 0.00035) * 8 - breath * 10;
      const scale = 1 + breath * 0.05;

      this.shell.style.transform = `translate3d(0, ${floatY.toFixed(2)}px, 0) rotateX(${(slowPitch - py * 9).toFixed(2)}deg) rotateY(${(slowYaw + px * 9).toFixed(2)}deg) rotateZ(${(Math.sin(now * 0.00006) * 2).toFixed(2)}deg) scale(${scale.toFixed(3)})`;
      this.membrane.style.transform = `scale(${(1 + breath * 0.16).toFixed(3)}) translateZ(0)`;
      this.cap.style.transform = `scale(${(1 + breath * 0.09).toFixed(3)}) translateZ(0)`;
      this.membrane.style.boxShadow = `inset 0 10px 30px rgba(255,255,255,0.05), inset 0 -25px 38px rgba(0,0,0,0.55), 0 0 ${40 + breath * 80}px rgba(154,215,255,${0.08 + breath * 0.1})`;
      this.cap.style.boxShadow = `inset 0 3px 14px rgba(255,255,255,0.08), inset 0 -12px 22px rgba(0,0,0,0.45), 0 0 ${26 + breath * 30}px rgba(154,215,255,${0.16 + breath * 0.14}), 0 0 ${46 + breath * 36}px rgba(213,193,255,${0.12 + breath * 0.09})`;

      this.drawCanvas(now, metrics);
    }

    drawCanvas(now, metrics) {
      const ctx = this.ctx;
      const width = this.canvas.width;
      const height = this.canvas.height;
      const cx = width / 2;
      const cy = height / 2;
      const radius = Math.min(width, height) * 0.24;
      const waveform = metrics.waveform;
      const breath = metrics.pulse;

      ctx.clearRect(0, 0, width, height);
      ctx.save();
      ctx.translate(cx, cy);

      ctx.strokeStyle = `rgba(255,255,255,${0.08 + breath * 0.08})`;
      ctx.lineWidth = 1.3 * this.dpr;
      for (let ring = 0; ring < 4; ring += 1) {
        ctx.beginPath();
        ctx.arc(0, 0, radius * (1.1 + ring * 0.22 + breath * 0.03), 0, Math.PI * 2);
        ctx.stroke();
      }

      ctx.save();
      ctx.rotate(now * 0.00014);
      const ringGradient = ctx.createRadialGradient(0, 0, radius * 0.7, 0, 0, radius * 1.9);
      ringGradient.addColorStop(0, `rgba(154,215,255,${0.02 + breath * 0.04})`);
      ringGradient.addColorStop(0.6, `rgba(154,215,255,${0.12 + breath * 0.1})`);
      ringGradient.addColorStop(1, 'rgba(154,215,255,0)');
      ctx.strokeStyle = ringGradient;
      ctx.lineWidth = 5 * this.dpr;
      ctx.beginPath();
      const count = 96;
      for (let i = 0; i <= count; i += 1) {
        const angle = (i / count) * Math.PI * 2;
        const waveSample = waveform.length ? (waveform[Math.floor((i / count) * waveform.length)] - 128) / 128 : Math.sin(now * 0.0018 + i * 0.4) * 0.2;
        const organic = Math.sin(angle * 3 + now * 0.0007) * 0.035 + Math.cos(angle * 5 - now * 0.0005) * 0.02;
        const r = radius * (1.52 + organic + waveSample * 0.08 + breath * 0.13);
        const x = Math.cos(angle) * r;
        const y = Math.sin(angle) * r;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.restore();

      ctx.globalCompositeOperation = 'screen';
      const barCount = 48;
      for (let i = 0; i < barCount; i += 1) {
        const angle = (i / barCount) * Math.PI * 2 + now * 0.00024;
        const amp = waveform.length ? Math.abs((waveform[Math.floor((i / barCount) * waveform.length)] - 128) / 128) : 0.08;
        const inner = radius * 1.24;
        const outer = radius * (1.5 + amp * 0.35 + breath * 0.25);
        const x1 = Math.cos(angle) * inner;
        const y1 = Math.sin(angle) * inner;
        const x2 = Math.cos(angle) * outer;
        const y2 = Math.sin(angle) * outer;
        ctx.strokeStyle = i % 2 === 0 ? `rgba(154,215,255,${0.18 + amp * 0.45})` : `rgba(255,193,169,${0.12 + amp * 0.35})`;
        ctx.lineWidth = (1.4 + amp * 2.8) * this.dpr;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      const centerGlow = ctx.createRadialGradient(0, 0, radius * 0.2, 0, 0, radius * (1 + breath * 0.5));
      centerGlow.addColorStop(0, `rgba(255,255,255,${0.09 + breath * 0.08})`);
      centerGlow.addColorStop(0.45, `rgba(154,215,255,${0.12 + breath * 0.1})`);
      centerGlow.addColorStop(1, 'rgba(154,215,255,0)');
      ctx.fillStyle = centerGlow;
      ctx.beginPath();
      ctx.arc(0, 0, radius * (1.05 + breath * 0.1), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  class LyricsRenderer {
    constructor(options, audioEngine, animationSystem) {
      this.stage = options.stage;
      this.modeButtons = Array.from(options.modeButtons);
      this.audioEngine = audioEngine;
      this.animation = animationSystem;
      this.mode = 'floating';
      this.lyrics = [];
      this.pendingRawLyrics = null;
      this.activeIndex = -1;
      this.lastActiveIndex = -1;
      this.activeChangedAt = 0;
      this.floatTrack = null;
      this.lineStage = null;
      this.nextCaptionText = null;
      this.karaokeFill = null;
      this.karaokeShine = null;
      this.waveChars = [];
      this.neonLine = null;
      this.minimalLine = null;
      this.modeButtons.forEach((button) => {
        button.addEventListener('click', () => this.setMode(button.dataset.mode));
      });
      this.showEmpty();
    }

    parseLRC(text) {
      const lines = text.split(/\r?\n/);
      const tag = /\[(\d{1,2}):(\d{2}(?:\.\d{1,3})?)\]/g;
      const output = [];
      let hasTimeTags = false;

      for (const rawLine of lines) {
        tag.lastIndex = 0;
        let match;
        const times = [];
        while ((match = tag.exec(rawLine)) !== null) {
          times.push(parseInt(match[1], 10) * 60 + parseFloat(match[2]));
        }
        if (times.length) {
          hasTimeTags = true;
          const textLine = rawLine.replace(tag, '').trim();
          times.forEach((time) => output.push({ time, text: textLine }));
        }
      }

      output.sort((a, b) => a.time - b.time);
      return hasTimeTags ? output : null;
    }

    distributeEvenly(text, duration) {
      const lines = text.split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
      if (!lines.length) return [];
      const safeDuration = Number.isFinite(duration) && duration > 0 ? duration : Math.max(lines.length * 3, 12);
      const step = safeDuration / Math.max(1, lines.length);
      return lines.map((line, index) => ({ time: index * step, text: line }));
    }

    loadFromText(text, preferTimed = true) {
      const normalized = String(text || '').replace(/^\uFEFF/, '');
      const parsed = preferTimed ? this.parseLRC(normalized) : null;
      if (parsed && parsed.length) {
        this.pendingRawLyrics = null;
        this.setLyrics(parsed);
        return parsed.length;
      }

      if (Number.isFinite(this.audioEngine.audio.duration) && this.audioEngine.audio.duration > 0) {
        this.pendingRawLyrics = null;
        const generated = this.distributeEvenly(normalized, this.audioEngine.audio.duration);
        this.setLyrics(generated);
        return generated.length;
      }

      this.pendingRawLyrics = normalized;
      this.setLyrics([]);
      return 0;
    }

    onDurationReady() {
      if (this.pendingRawLyrics) {
        const generated = this.distributeEvenly(this.pendingRawLyrics, this.audioEngine.audio.duration);
        this.pendingRawLyrics = null;
        this.setLyrics(generated);
      }
    }

    setLyrics(lines) {
      this.lyrics = Array.isArray(lines) ? lines : [];
      this.activeIndex = -1;
      this.lastActiveIndex = -1;
      this.renderModeLayout();
    }

    setMode(mode) {
      this.mode = mode;
      this.modeButtons.forEach((button) => button.classList.toggle('active', button.dataset.mode === mode));
      this.activeIndex = -1;
      this.lastActiveIndex = -1;
      this.renderModeLayout();
    }

    showEmpty() {
      this.stage.innerHTML = '';
      const empty = document.createElement('div');
      empty.className = 'lyrics-empty';
      empty.textContent = 'No lyrics loaded yet. Add an LRC file or paste plain text to animate the full experience.';
      this.stage.appendChild(empty);
    }

    renderModeLayout() {
      this.stage.innerHTML = '';
      this.floatTrack = null;
      this.lineStage = null;
      this.nextCaptionText = null;
      this.karaokeFill = null;
      this.karaokeShine = null;
      this.waveChars = [];
      this.neonLine = null;
      this.minimalLine = null;

      if (!this.lyrics.length) {
        this.showEmpty();
        return;
      }

      if (this.mode === 'floating') {
        const floatSpace = document.createElement('div');
        floatSpace.className = 'float-space';
        const track = document.createElement('div');
        track.className = 'float-track';
        this.lyrics.forEach((line, index) => {
          const el = document.createElement('div');
          el.className = 'float-line';
          el.textContent = line.text || '\u00A0';
          el.addEventListener('click', () => {
            this.audioEngine.seek(line.time);
            if (this.audioEngine.audio.paused) {
              this.audioEngine.togglePlayback().catch(() => {});
            }
          });
          track.appendChild(el);
        });
        floatSpace.appendChild(track);
        this.stage.appendChild(floatSpace);
        this.floatTrack = track;
      } else {
        const lineStage = document.createElement('div');
        lineStage.className = 'line-stage';
        lineStage.addEventListener('click', () => {
          if (this.activeIndex >= 0) {
            this.audioEngine.seek(this.lyrics[this.activeIndex].time);
          }
        });
        const nextCaption = document.createElement('div');
        nextCaption.className = 'next-caption';
        nextCaption.innerHTML = '<span>Up next</span><strong></strong>';
        this.stage.appendChild(lineStage);
        this.stage.appendChild(nextCaption);
        this.lineStage = lineStage;
        this.nextCaptionText = nextCaption.querySelector('strong');
      }

      this.update(this.audioEngine.audio.currentTime || 0, { pulse: 0, overall: 0 }, performance.now());
    }

    getActiveIndex(time) {
      let index = -1;
      for (let i = 0; i < this.lyrics.length; i += 1) {
        if (this.lyrics[i].time <= time + 0.06) index = i;
        else break;
      }
      return index;
    }

    buildSingleLine() {
      if (!this.lineStage) return;
      const text = this.activeIndex >= 0 ? this.lyrics[this.activeIndex].text || '' : '';
      const next = this.lyrics[this.activeIndex + 1];
      if (this.nextCaptionText) this.nextCaptionText.textContent = next ? next.text : '—';
      this.lineStage.innerHTML = '';

      if (this.mode === 'karaoke') {
        const wrap = document.createElement('div');
        wrap.className = 'karaoke-wrap';
        const base = document.createElement('span');
        base.className = 'karaoke-base';
        base.textContent = text;
        const clip = document.createElement('div');
        clip.className = 'karaoke-fill-clip';
        const fill = document.createElement('span');
        fill.className = 'karaoke-fill';
        fill.textContent = text;
        const shine = document.createElement('div');
        shine.className = 'karaoke-shine';
        clip.appendChild(fill);
        wrap.appendChild(base);
        wrap.appendChild(clip);
        wrap.appendChild(shine);
        this.lineStage.appendChild(wrap);
        this.karaokeFill = clip;
        this.karaokeShine = shine;
      } else if (this.mode === 'wave') {
        const wrap = document.createElement('div');
        wrap.className = 'wave-wrap';
        this.waveChars = [...text].map((character) => {
          const span = document.createElement('span');
          span.className = 'wave-char';
          span.textContent = character === ' ' ? '\u00A0' : character;
          wrap.appendChild(span);
          return span;
        });
        this.lineStage.appendChild(wrap);
      } else if (this.mode === 'neon') {
        const div = document.createElement('div');
        div.className = 'neon-line';
        div.textContent = text;
        this.lineStage.appendChild(div);
        this.neonLine = div;
      } else if (this.mode === 'minimal') {
        const div = document.createElement('div');
        div.className = 'minimal-line';
        div.textContent = text;
        this.lineStage.appendChild(div);
        requestAnimationFrame(() => div.classList.add('visible'));
        this.minimalLine = div;
      }
    }

    update(currentTime, metrics, now) {
      if (!this.lyrics.length) return;

      const index = this.getActiveIndex(currentTime);
      if (index !== this.activeIndex) {
        this.lastActiveIndex = this.activeIndex;
        this.activeIndex = index;
        this.activeChangedAt = now;
        if (this.mode !== 'floating') this.buildSingleLine();
      }

      if (this.mode === 'floating') {
        this.updateFloating(metrics, now);
      } else {
        this.updateSingleLine(currentTime, metrics, now);
      }
    }

    updateFloating(metrics, now) {
      if (!this.floatTrack) return;
      const lines = this.floatTrack.children;
      const active = Math.max(0, this.activeIndex);
      const wobble = Math.sin(now * 0.0006) * 10;
      for (let i = 0; i < lines.length; i += 1) {
        const element = lines[i];
        const distance = i - active;
        const depth = Math.abs(distance);
        const focus = Math.max(0, 1 - depth / 6);
        const y = distance * 58 + Math.sin(now * 0.0009 + i * 0.6) * (6 + depth) + (distance === 0 ? Math.sin(now * 0.0022) * 2 : 0);
        const x = Math.sin(now * 0.00028 + i * 1.3) * (10 + depth * 4) + this.animation.pointer.x * depth * 10;
        const z = -depth * 90 + focus * 30;
        const scale = 0.7 + focus * 0.34 + (distance === 0 ? metrics.pulse * 0.07 : 0);
        const opacity = this.animation.clamp(1.08 - depth * 0.18, 0.04, 1);
        const blur = this.animation.clamp(depth * 1.6 - focus * 0.6, 0, 14);
        const glow = distance === 0 ? 0.32 + metrics.pulse * 0.45 : focus * 0.16;
        const rotateX = distance * -5 + Math.sin(now * 0.00024 + i) * 1.4;
        const rotateY = distance * 2.8 + wobble * 0.08;

        element.classList.toggle('current', distance === 0);
        element.classList.toggle('near', Math.abs(distance) === 1);
        if (distance === 0 && this.lastActiveIndex !== this.activeIndex) {
          element.classList.remove('entering');
          // Force reflow to restart CSS animation
          void element.offsetWidth;
          element.classList.add('entering');
        }

        element.style.opacity = opacity.toFixed(3);
        element.style.filter = `blur(${blur.toFixed(2)}px)`;
        element.style.textShadow = `0 0 ${18 + glow * 40}px rgba(154,215,255,${glow.toFixed(3)}), 0 0 ${26 + glow * 44}px rgba(213,193,255,${(glow * 0.55).toFixed(3)})`;
        element.style.transform = `translate3d(calc(-50% + ${x.toFixed(2)}px), calc(-50% + ${y.toFixed(2)}px), ${z.toFixed(2)}px) rotateX(${rotateX.toFixed(2)}deg) rotateY(${rotateY.toFixed(2)}deg) scale(${scale.toFixed(3)})`;
      }
    }

    updateSingleLine(currentTime, metrics, now) {
      if (this.mode === 'karaoke' && this.karaokeFill) {
        const current = this.lyrics[this.activeIndex];
        const next = this.lyrics[this.activeIndex + 1];
        const start = current ? current.time : 0;
        const end = next ? next.time : start + 4;
        const progress = this.animation.clamp((currentTime - start) / ((end - start) || 1), 0, 1);
        this.karaokeFill.style.width = `${(progress * 100).toFixed(2)}%`;
        if (this.karaokeShine) {
          this.karaokeShine.style.transform = `translateX(${(-120 + progress * 190).toFixed(2)}%)`;
          this.karaokeShine.style.opacity = `${0.28 + metrics.pulse * 0.44}`;
        }
      }

      if (this.mode === 'wave' && this.waveChars.length) {
        this.waveChars.forEach((char, index) => {
          const lift = Math.sin(now * 0.0042 + index * 0.42) * (4 + metrics.overall * 18);
          const scale = 1 + Math.cos(now * 0.0031 + index * 0.33) * 0.02 + metrics.pulse * 0.06;
          const blur = Math.max(0, metrics.pulse * 2.2 - 0.2);
          const alpha = 0.7 + (Math.sin(now * 0.0028 + index * 0.4) + 1) * 0.08 + metrics.overall * 0.22;
          char.style.transform = `translateY(${lift.toFixed(2)}px) scale(${scale.toFixed(3)})`;
          char.style.opacity = alpha.toFixed(3);
          char.style.filter = `blur(${blur.toFixed(2)}px)`;
          char.style.textShadow = `0 0 ${18 + metrics.pulse * 26}px rgba(154,215,255,${0.16 + metrics.pulse * 0.34})`;
        });
      }

      if (this.mode === 'neon' && this.neonLine) {
        const flicker = 0.9 + Math.sin(now * 0.014) * 0.05 + Math.sin(now * 0.003 + metrics.pulse * 6) * 0.04;
        this.neonLine.style.opacity = flicker.toFixed(3);
        this.neonLine.style.textShadow = `0 0 4px rgba(255,255,255,0.95), 0 0 ${14 + metrics.pulse * 18}px rgba(154,215,255,0.82), 0 0 ${32 + metrics.pulse * 28}px rgba(154,215,255,0.72), 0 0 ${60 + metrics.pulse * 40}px rgba(213,193,255,0.55)`;
        this.neonLine.style.transform = `scale(${(1 + metrics.pulse * 0.03).toFixed(3)}) translateY(${(Math.sin(now * 0.0028) * 2).toFixed(2)}px)`;
      }

      if (this.mode === 'minimal' && this.minimalLine) {
        this.minimalLine.style.filter = `blur(${Math.max(0, 2 - metrics.pulse * 1.2).toFixed(2)}px)`;
        this.minimalLine.style.textShadow = `0 0 ${12 + metrics.pulse * 18}px rgba(255,255,255,${0.08 + metrics.pulse * 0.18})`;
      }
    }
  }

  class ControlsManager {
    constructor(options, audioEngine, lyricsRenderer, animationSystem) {
      this.uiRoot = options.uiRoot;
      this.audioEngine = audioEngine;
      this.lyricsRenderer = lyricsRenderer;
      this.animation = animationSystem;
      this.audioInput = options.audioInput;
      this.lyricsInput = options.lyricsInput;
      this.audioLabel = options.audioLabel;
      this.lyricsLabel = options.lyricsLabel;
      this.pasteToggle = options.pasteToggle;
      this.pasteDrawer = options.pasteDrawer;
      this.pasteArea = options.pasteArea;
      this.pasteApply = options.pasteApply;
      this.playButton = options.playButton;
      this.backButton = options.backButton;
      this.forwardButton = options.forwardButton;
      this.progressBar = options.progressBar;
      this.progressFill = options.progressFill;
      this.progressGlow = options.progressGlow;
      this.progressKnob = options.progressKnob;
      this.currentTime = options.currentTime;
      this.durationTime = options.durationTime;
      this.trackTitle = options.trackTitle;
      this.liveDot = options.liveDot;
      this.statusMsg = options.statusMsg;
      this.volumeControl = options.volumeControl;
      this.modeBadge = options.modeBadge;
      this.dropzone = options.dropzone;
      this.isSeeking = false;
      this.hideTimer = null;
      this.statusTimer = null;
      this.bind();
      this.updateVolumeFill();
      this.updateModeBadge();
    }

    bind() {
      this.playButton.addEventListener('click', async () => {
        if (!this.audioEngine.audio.src) {
          this.audioInput.click();
          return;
        }
        try {
          await this.audioEngine.togglePlayback();
          this.revealTemporarily();
        } catch (error) {
          this.showStatus(error.message || 'Playback could not start.', true);
        }
      });

      this.backButton.addEventListener('click', () => {
        this.audioEngine.seek((this.audioEngine.audio.currentTime || 0) - 10);
        this.revealTemporarily();
      });

      this.forwardButton.addEventListener('click', () => {
        this.audioEngine.seek((this.audioEngine.audio.currentTime || 0) + 10);
        this.revealTemporarily();
      });

      const seekFromEvent = (event) => {
        const rect = this.progressBar.getBoundingClientRect();
        const point = event.touches ? event.touches[0] : event;
        const progress = this.animation.clamp((point.clientX - rect.left) / rect.width, 0, 1);
        this.progressBar.setAttribute('aria-valuenow', String(Math.round(progress * 100)));
        if (Number.isFinite(this.audioEngine.audio.duration)) {
          this.audioEngine.seek(progress * this.audioEngine.audio.duration);
        }
      };

      this.progressBar.addEventListener('pointerdown', (event) => {
        this.isSeeking = true;
        seekFromEvent(event);
        this.revealTemporarily();
      });
      window.addEventListener('pointermove', (event) => {
        if (this.isSeeking) seekFromEvent(event);
      }, { passive: true });
      window.addEventListener('pointerup', () => { this.isSeeking = false; });

      this.progressBar.addEventListener('keydown', (event) => {
        if (!Number.isFinite(this.audioEngine.audio.duration)) return;
        const step = event.shiftKey ? 10 : 5;
        if (event.key === 'ArrowLeft') {
          event.preventDefault();
          this.audioEngine.seek(this.audioEngine.audio.currentTime - step);
        }
        if (event.key === 'ArrowRight') {
          event.preventDefault();
          this.audioEngine.seek(this.audioEngine.audio.currentTime + step);
        }
      });

      this.volumeControl.addEventListener('input', () => {
        this.audioEngine.setVolume(this.volumeControl.value);
        this.updateVolumeFill();
      });
      this.audioEngine.setVolume(this.volumeControl.value);

      this.audioInput.addEventListener('change', (event) => {
        const file = event.target.files && event.target.files[0];
        if (file) this.loadAudioFile(file);
      });

      this.lyricsInput.addEventListener('change', (event) => {
        const file = event.target.files && event.target.files[0];
        if (file) this.loadLyricsFile(file);
      });

      this.pasteToggle.addEventListener('click', () => {
        const open = this.pasteDrawer.classList.toggle('open');
        this.pasteToggle.classList.toggle('active', open);
        this.revealTemporarily();
      });

      this.pasteApply.addEventListener('click', () => {
        const value = this.pasteArea.value.trim();
        if (!value) {
          this.showStatus('Paste lyrics first.', true);
          return;
        }
        const count = this.lyricsRenderer.loadFromText(value, true);
        this.lyricsLabel.classList.add('has-file');
        this.showStatus(count ? `${count} lyric lines loaded.` : 'Lyrics loaded and will sync once audio duration is known.', false);
        this.pasteDrawer.classList.remove('open');
        this.pasteToggle.classList.remove('active');
      });

      ['dragenter', 'dragover'].forEach((type) => {
        this.dropzone.addEventListener(type, (event) => {
          event.preventDefault();
          this.dropzone.style.boxShadow = '0 0 0 1px rgba(154,215,255,0.55), 0 30px 80px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.1)';
          this.revealTemporarily();
        });
      });
      ['dragleave', 'drop'].forEach((type) => {
        this.dropzone.addEventListener(type, (event) => {
          event.preventDefault();
          this.dropzone.style.boxShadow = '';
        });
      });
      this.dropzone.addEventListener('drop', (event) => {
        const files = Array.from((event.dataTransfer && event.dataTransfer.files) || []);
        files.forEach((file) => {
          const audioMatch = file.type.startsWith('audio/') || /\.(mp3|wav|ogg|m4a|aac|mp4|flac|webm)$/i.test(file.name);
          const lyricMatch = /\.(lrc|txt)$/i.test(file.name);
          if (audioMatch) this.loadAudioFile(file);
          else if (lyricMatch) this.loadLyricsFile(file);
        });
      });

      this.audioEngine.audio.addEventListener('play', () => {
        this.playButton.classList.add('playing');
        this.liveDot.classList.add('live');
        this.scheduleAutoHide();
      });
      this.audioEngine.audio.addEventListener('pause', () => {
        this.playButton.classList.remove('playing');
        this.liveDot.classList.remove('live');
        this.uiRoot.classList.remove('ui-hidden');
        clearTimeout(this.hideTimer);
      });
      this.audioEngine.audio.addEventListener('ended', () => {
        this.playButton.classList.remove('playing');
        this.liveDot.classList.remove('live');
        this.uiRoot.classList.remove('ui-hidden');
        clearTimeout(this.hideTimer);
      });
      this.audioEngine.audio.addEventListener('loadedmetadata', () => {
        this.durationTime.textContent = this.formatTime(this.audioEngine.audio.duration);
        this.lyricsRenderer.onDurationReady();
      });
      this.audioEngine.audio.addEventListener('error', () => {
        const code = this.audioEngine.audio.error ? this.audioEngine.audio.error.code : '?';
        this.showStatus(`Browser could not decode this file (code ${code}). Try a standard MP3 or WAV.`, true);
      });

      ['pointermove', 'touchstart', 'focusin', 'mouseenter'].forEach((type) => {
        window.addEventListener(type, () => this.revealTemporarily(), { passive: true });
      });

      window.addEventListener('keydown', (event) => {
        if (document.activeElement === this.pasteArea) return;
        if (event.code === 'Space') {
          event.preventDefault();
          this.playButton.click();
        }
      });
    }

    updateVolumeFill() {
      const value = parseFloat(this.volumeControl.value) || 0;
      const percent = value * 100;
      this.volumeControl.style.background = `linear-gradient(90deg, rgba(154,215,255,0.9) 0%, rgba(154,215,255,0.9) ${percent}%, rgba(255,255,255,0.12) ${percent}%, rgba(255,255,255,0.12) 100%)`;
    }

    loadAudioFile(file) {
      this.showStatus('Loading audio…', false);
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          this.audioEngine.audio.src = reader.result;
          this.audioEngine.audio.load();
          this.trackTitle.textContent = file.name.replace(/\.[^/.]+$/, '');
          this.audioLabel.classList.add('has-file');
          this.showStatus(`Audio loaded: ${file.name}`, false);
          this.revealTemporarily();
        } catch (error) {
          this.showStatus(`Audio load failed: ${error.message}`, true);
        }
      };
      reader.onerror = () => this.showStatus('The selected audio file could not be read.', true);
      reader.readAsDataURL(file);
    }

    loadLyricsFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        const content = String(reader.result).replace(/^\uFEFF/, '');
        const count = this.lyricsRenderer.loadFromText(content, /\.lrc$/i.test(file.name) || /\[\d{1,2}:\d{2}/.test(content));
        this.lyricsLabel.classList.add('has-file');
        this.showStatus(count ? `${count} lyric lines loaded.` : 'Lyrics loaded and will sync once duration is available.', false);
      };
      reader.onerror = () => this.showStatus('The selected lyric file could not be read.', true);
      reader.readAsText(file);
    }

    revealTemporarily() {
      this.uiRoot.classList.remove('ui-hidden');
      this.scheduleAutoHide();
    }

    scheduleAutoHide() {
      clearTimeout(this.hideTimer);
      if (this.audioEngine.audio.paused) return;
      this.hideTimer = setTimeout(() => {
        if (!this.audioEngine.audio.paused) this.uiRoot.classList.add('ui-hidden');
      }, 2400);
    }

    showStatus(message, isError) {
      this.statusMsg.textContent = message;
      this.statusMsg.classList.toggle('error', Boolean(isError));
      clearTimeout(this.statusTimer);
      this.statusTimer = setTimeout(() => {
        this.statusMsg.textContent = '';
        this.statusMsg.classList.remove('error');
      }, 5200);
    }

    updateModeBadge() {
      const label = this.lyricsRenderer.mode.charAt(0).toUpperCase() + this.lyricsRenderer.mode.slice(1);
      this.modeBadge.textContent = `${label} mode`;
    }

    formatTime(seconds) {
      const safe = Number.isFinite(seconds) && seconds >= 0 ? seconds : 0;
      const minutes = Math.floor(safe / 60);
      const remaining = Math.floor(safe % 60);
      return `${minutes}:${String(remaining).padStart(2, '0')}`;
    }

    render() {
      const current = this.audioEngine.audio.currentTime || 0;
      const duration = this.audioEngine.audio.duration || 0;
      const progress = duration ? current / duration : 0;
      const percent = progress * 100;
      this.currentTime.textContent = this.formatTime(current);
      this.durationTime.textContent = this.formatTime(duration);
      this.progressFill.style.width = `${percent}%`;
      this.progressGlow.style.width = `${percent}%`;
      this.progressKnob.style.left = `${percent}%`;
      this.progressBar.setAttribute('aria-valuenow', String(Math.round(percent)));
      this.updateModeBadge();
    }
  }

  const animation = new AnimationSystem(document.documentElement);
  const audioEngine = new AudioEngine(document.getElementById('audioElement'), animation);
  const particles = new ParticleSystem(animation.prefersReducedMotion ? 36 : 88);
  const background = new BackgroundRenderer(document.getElementById('backgroundCanvas'), animation, particles);
  const lyricsRenderer = new LyricsRenderer({
    stage: document.getElementById('lyricsStage'),
    modeButtons: document.querySelectorAll('.mode-pill')
  }, audioEngine, animation);
  const speakerVisualizer = new SpeakerVisualizer({
    canvas: document.getElementById('speakerCanvas'),
    shell: document.getElementById('speakerShell'),
    scene: document.getElementById('speakerScene'),
    membrane: document.getElementById('speakerMembrane'),
    cap: document.getElementById('speakerCap')
  }, animation);
  const controlsManager = new ControlsManager({
    uiRoot: document.getElementById('appShell'),
    audioInput: document.getElementById('audioInput'),
    lyricsInput: document.getElementById('lyricsInput'),
    audioLabel: document.getElementById('audioLabel'),
    lyricsLabel: document.getElementById('lyricsLabel'),
    pasteToggle: document.getElementById('pasteToggle'),
    pasteDrawer: document.getElementById('pasteDrawer'),
    pasteArea: document.getElementById('pasteArea'),
    pasteApply: document.getElementById('pasteApply'),
    playButton: document.getElementById('playButton'),
    backButton: document.getElementById('backButton'),
    forwardButton: document.getElementById('forwardButton'),
    progressBar: document.getElementById('progressBar'),
    progressFill: document.getElementById('progressFill'),
    progressGlow: document.getElementById('progressGlow'),
    progressKnob: document.getElementById('progressKnob'),
    currentTime: document.getElementById('currentTime'),
    durationTime: document.getElementById('durationTime'),
    trackTitle: document.getElementById('trackTitle'),
    liveDot: document.getElementById('liveDot'),
    statusMsg: document.getElementById('statusMsg'),
    volumeControl: document.getElementById('volumeControl'),
    modeBadge: document.getElementById('modeBadge'),
    dropzone: document.getElementById('dropzone')
  }, audioEngine, lyricsRenderer, animation);

  animation.add((dt, now) => {
    const metrics = audioEngine.sample(dt, now);
    background.render(now, metrics);
    speakerVisualizer.render(now, metrics);
    lyricsRenderer.update(audioEngine.audio.currentTime || 0, metrics, now);
    controlsManager.render();
  });
})();

    </script>
</body>
