<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonicGlass - Premium Lyric Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600;800&family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: rgba(255, 255, 255, 0.9);
            --glass-bg: rgba(20, 20, 25, 0.25);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            --karaoke-progress: 0%;
            --bass-scale: 1;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        body, html {
            width: 100%; height: 100%; background-color: #050505; color: var(--primary);
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* --- Canvas Background --- */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            transform: scale(var(--bass-scale));
            transition: transform 0.1s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* --- Main Layout --- */
        #app-container {
            position: relative; z-index: 1; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #lyrics-display {
            flex-grow: 1; width: 90%; max-width: 1200px;
            display: flex; justify-content: center; align-items: center;
            perspective: 1000px; text-align: center; padding: 20px;
            mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 20%, black 80%, transparent 100%);
        }

        .lyric-line { position: absolute; opacity: 0; pointer-events: none; will-change: transform, opacity, filter; width: 100%; }

        /* --- MODE: Floating (Cinematic) --- */
        .mode-floating .lyric-line { font-size: clamp(2rem, 5vw, 4rem); font-weight: 200; letter-spacing: -1px; text-shadow: 0 0 20px rgba(255,255,255,0); }
        .mode-floating .lyric-line.active { animation: float-reveal 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .mode-floating .lyric-line.past { animation: float-exit 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        @keyframes float-reveal {
            0% { opacity: 0; transform: translateZ(100px) scale(1.1) translateY(20px); filter: blur(20px); text-shadow: 0 0 0px rgba(255,255,255,0); }
            50% { text-shadow: 0 0 30px rgba(255,255,255,0.8); }
            100% { opacity: 1; transform: translateZ(0) scale(1) translateY(0); filter: blur(0px); text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        }
        @keyframes float-exit {
            0% { opacity: 1; transform: translateY(0); filter: blur(0px); }
            100% { opacity: 0; transform: translateY(-40px) scale(0.95); filter: blur(10px); }
        }

        /* --- MODE: Karaoke --- */
        .mode-karaoke .lyric-line { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 600; color: rgba(255,255,255,0.2); -webkit-text-stroke: 1px rgba(255,255,255,0.1); }
        .mode-karaoke .lyric-line.active {
            opacity: 1; transform: scale(1.02); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            background: linear-gradient(to right, #fff var(--karaoke-progress), rgba(255,255,255,0.2) var(--karaoke-progress));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
        }

        /* --- MODE: Minimal --- */
        .mode-minimal .lyric-line { font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: 400; color: #fff; }
        .mode-minimal .lyric-line.active { opacity: 1; transition: opacity 0.8s ease, transform 0.8s ease; transform: translateY(0); }
        .mode-minimal .lyric-line.past, .mode-minimal .lyric-line.future { opacity: 0; transform: translateY(10px); }

        /* --- MODE: BD (Comic Book) --- */
        .mode-bd .lyric-line { font-size: clamp(2.5rem, 6vw, 5rem); font-weight: 800; text-transform: uppercase; font-style: italic; color: #fff; }
        .mode-bd .lyric-line.active { animation: bd-smash 0.6s cubic-bezier(0.25, 1.5, 0.5, 1) forwards; }
        .mode-bd .lyric-line.past { animation: bd-exit 0.4s ease-in forwards; }

        @keyframes bd-smash {
            0% { opacity: 0; transform: scale(2) rotate(-10deg) translateZ(200px); filter: drop-shadow(0px 0px 0px rgba(255,255,255,0)); }
            100% { opacity: 1; transform: scale(1) rotate(-3deg) translateZ(0); filter: drop-shadow(8px 8px 0px rgba(255, 255, 255, 0.3)); }
        }
        @keyframes bd-exit {
            0% { opacity: 1; transform: scale(1) rotate(-3deg); }
            100% { opacity: 0; transform: scale(0.8) rotate(5deg) translateY(50px); filter: blur(5px); }
        }

        /* --- MODE: Neon --- */
        .mode-neon .lyric-line { font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; color: #fff; }
        .mode-neon .lyric-line.active {
            opacity: 1;
            text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff;
            animation: neon-flicker 3s infinite alternate, neon-enter 1s ease-out forwards;
        }
        .mode-neon .lyric-line.past { opacity: 0; transition: opacity 0.5s ease; }

        @keyframes neon-enter { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes neon-flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #0ff, 0 0 40px #0ff, 0 0 80px #0ff; opacity: 1; }
            20%, 24%, 55% { text-shadow: none; opacity: 0.8; }
        }

        /* --- MODE: Wave --- */
        .mode-wave .lyric-line { font-size: clamp(2rem, 5vw, 4rem); font-weight: 400; }
        .mode-wave .lyric-line.active { opacity: 1; }
        .mode-wave .lyric-line span { display: inline-block; opacity: 0; transform: translateY(20px); will-change: transform, opacity; }
        .mode-wave .lyric-line.active span { animation: wave-char 2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .mode-wave .lyric-line.past { opacity: 0; transition: opacity 0.5s; }

        @keyframes wave-char {
            0% { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            20% { opacity: 1; transform: translateY(-10px); filter: blur(0px); }
            40% { transform: translateY(0); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- Glassmorphism Controls --- */
        #controls-wrapper {
            position: absolute; bottom: 40px; width: 90%; max-width: 650px;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 10;
        }
        #controls-wrapper.idle { opacity: 0; transform: translateY(20px); pointer-events: none; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(24px) saturate(150%);
            -webkit-backdrop-filter: blur(24px) saturate(150%); border: 1px solid var(--glass-border);
            border-radius: 24px; box-shadow: var(--glass-shadow); padding: 20px 30px;
            display: flex; flex-direction: column; gap: 15px; position: relative; overflow: hidden;
        }
        .glass-panel::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        }

        .controls-row { display: flex; justify-content: space-between; align-items: center; gap: 15px; }

        /* Progress Bar */
        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-bar { height: 100%; background: #fff; border-radius: 2px; width: 0%; box-shadow: 0 0 10px rgba(255,255,255,0.5); pointer-events: none; }

        /* Buttons */
        button, select { background: transparent; border: none; color: #fff; cursor: pointer; font-family: inherit; font-size: 1rem; outline: none; transition: all 0.2s ease; }
        button:hover { color: rgba(255,255,255,0.7); transform: scale(1.05); }
        .play-btn { width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: center; align-items: center; }
        .play-btn:hover { background: rgba(255,255,255,0.2); }
        
        .icon-btn { width: 35px; height: 35px; border-radius: 12px; display: flex; justify-content: center; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .icon-btn:hover { background: rgba(255,255,255,0.15); }
        
        select { appearance: none; background: rgba(0,0,0,0.3); padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }

        /* Init screen */
        #init-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 5; transition: opacity 0.5s;
        }

        /* Hidden inputs */
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="app-container">
        
        <div id="init-screen">
            <h1 style="font-weight: 200; font-size: 3rem; margin-bottom: 10px;">SonicGlass</h1>
            <p style="opacity: 0.5;">Utilisez les contrôles ci-dessous pour charger votre musique</p>
        </div>

        <div id="lyrics-display" class="mode-floating"></div>

        <div id="controls-wrapper">
            <div class="glass-panel">
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div class="controls-row">
                    <span id="time-current" style="font-size: 0.8rem; opacity: 0.7; width: 40px;">0:00</span>
                    
                    <button class="icon-btn" id="btn-upload-audio" title="Charger Audio">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                    </button>
                    <input type="file" id="file-audio" accept=".mp3,.wav,.ogg,.m4a">

                    <button class="icon-btn" id="btn-upload-lrc" title="Charger Paroles (.lrc)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    </button>
                    <input type="file" id="file-lrc" accept=".lrc">

                    <button class="play-btn" id="btn-play">
                        <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    
                    <select id="mode-selector">
                        <option value="mode-floating">Floating</option>
                        <option value="mode-karaoke">Karaoké</option>
                        <option value="mode-bd">BD 3D</option>
                        <option value="mode-neon">Neon</option>
                        <option value="mode-wave">Wave</option>
                        <option value="mode-minimal">Minimal</option>
                    </select>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 1. Audio Engine ---
        class AudioEngine {
            constructor() {
                this.audio = new Audio();
                this.audio.crossOrigin = "anonymous";
                this.context = null; this.analyser = null; this.source = null; this.dataArray = null; this.bassEnergy = 0;
                this.audio.addEventListener('ended', () => {
                    document.getElementById('icon-play').style.display = 'block';
                    document.getElementById('icon-pause').style.display = 'none';
                });
            }
            init() {
                if (this.context) return;
                this.context = new (window.AudioContext || window.webkitAudioContext)();
                this.analyser = this.context.createAnalyser();
                this.analyser.fftSize = 256;
                this.source = this.context.createMediaElementSource(this.audio);
                this.source.connect(this.analyser);
                this.analyser.connect(this.context.destination);
                this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
            }
            load(url) { this.audio.src = url; this.audio.load(); }
            togglePlay() {
                if (!this.context) this.init();
                if (this.context.state === 'suspended') this.context.resume();
                if (this.audio.paused) { this.audio.play(); return true; } 
                else { this.audio.pause(); return false; }
            }
            seek(percent) { if(this.audio.duration) this.audio.currentTime = percent * this.audio.duration; }
            updateData() {
                if (!this.analyser || this.audio.paused) return;
                this.analyser.getByteFrequencyData(this.dataArray);
                let bassSum = 0; for(let i=0; i<10; i++) bassSum += this.dataArray[i];
                this.bassEnergy = bassSum / 10;
                let scale = 1 + (this.bassEnergy / 255) * 0.05;
                document.documentElement.style.setProperty('--bass-scale', scale);
            }
        }

        // --- 2. LRC Parser ---
        class LRCParser {
            static parse(lrcText) {
                const lines = lrcText.split('\n'); const lyrics = []; const regex = /\[(\d{2}):(\d{2}\.\d{2,3})\](.*)/;
                lines.forEach(line => {
                    const match = regex.exec(line);
                    if (match) {
                        const time = parseInt(match[1], 10) * 60 + parseFloat(match[2]);
                        const text = match[3].trim();
                        if (text) lyrics.push({ time, text, duration: 0 });
                    }
                });
                for(let i=0; i<lyrics.length-1; i++) lyrics[i].duration = lyrics[i+1].time - lyrics[i].time;
                if(lyrics.length > 0) lyrics[lyrics.length-1].duration = 5;
                return lyrics;
            }
        }

        // --- 3. Visualizer ---
        class Visualizer {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId); this.ctx = this.canvas.getContext('2d');
                this.particles = []; this.resize(); window.addEventListener('resize', () => this.resize());
                for(let i=0; i<50; i++) this.particles.push(this.createParticle());
            }
            resize() { this.width = window.innerWidth; this.height = window.innerHeight; this.canvas.width = this.width; this.canvas.height = this.height; }
            createParticle() { return { x: Math.random() * this.width, y: Math.random() * this.height, size: Math.random() * 3 + 1, speedY: Math.random() * -0.5 - 0.1, opacity: Math.random() * 0.5 + 0.1 }; }
            draw(bassEnergy) {
                this.ctx.globalCompositeOperation = 'source-over'; this.ctx.fillStyle = `rgba(5, 5, 5, 0.2)`; this.ctx.fillRect(0, 0, this.width, this.height);
                this.ctx.globalCompositeOperation = 'lighter';
                const gradient = this.ctx.createRadialGradient(this.width/2, this.height/2, 0, this.width/2, this.height/2, this.width/2);
                const bassPulse = bassEnergy / 255;
                gradient.addColorStop(0, `rgba(40, 60, 100, ${0.1 + bassPulse * 0.2})`); gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                this.ctx.fillStyle = gradient; this.ctx.fillRect(0, 0, this.width, this.height);
                this.particles.forEach(p => {
                    p.y += p.speedY; if (p.y < 0) { p.y = this.height; p.x = Math.random() * this.width; }
                    this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size + (bassPulse*2), 0, Math.PI * 2);
                    this.ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity + bassPulse*0.2})`; this.ctx.fill();
                });
            }
        }

        // --- 4. Main App ---
        class App {
            constructor() {
                this.audioEngine = new AudioEngine(); this.visualizer = new Visualizer('bg-canvas');
                this.lyrics = []; this.currentLyricIndex = -1; this.mode = 'mode-floating';
                this.uiSetup(); this.loop = this.loop.bind(this); requestAnimationFrame(this.loop);
            }

            uiSetup() {
                // Upload Listeners
                document.getElementById('btn-upload-audio').addEventListener('click', () => document.getElementById('file-audio').click());
                document.getElementById('btn-upload-lrc').addEventListener('click', () => document.getElementById('file-lrc').click());

                document.getElementById('file-audio').addEventListener('change', e => {
                    if(e.target.files.length > 0) this.handleAudio(e.target.files[0]);
                });
                document.getElementById('file-lrc').addEventListener('change', e => {
                    if(e.target.files.length > 0) this.handleLRC(e.target.files[0]);
                });

                // Playback Controls
                const btnPlay = document.getElementById('btn-play');
                const iconPlay = document.getElementById('icon-play');
                const iconPause = document.getElementById('icon-pause');
                
                btnPlay.addEventListener('click', () => {
                    const isPlaying = this.audioEngine.togglePlay();
                    iconPlay.style.display = isPlaying ? 'none' : 'block';
                    iconPause.style.display = isPlaying ? 'block' : 'none';
                });

                document.getElementById('progress-container').addEventListener('click', e => {
                    const rect = e.currentTarget.getBoundingClientRect();
                    this.audioEngine.seek((e.clientX - rect.left) / rect.width);
                });

                // Mode Selector
                document.getElementById('mode-selector').addEventListener('change', e => {
                    document.getElementById('lyrics-display').className = e.target.value;
                    this.mode = e.target.value;
                    this.renderAllLyrics(); // Re-render needed especially for 'Wave' mode
                });

                // Auto-hide controls
                let timeout;
                const wrapper = document.getElementById('controls-wrapper');
                const resetIdle = () => {
                    wrapper.classList.remove('idle'); document.body.style.cursor = 'default';
                    clearTimeout(timeout);
                    timeout = setTimeout(() => {
                        if(!this.audioEngine.audio.paused) { wrapper.classList.add('idle'); document.body.style.cursor = 'none'; }
                    }, 3000);
                };
                window.addEventListener('mousemove', resetIdle); window.addEventListener('touchstart', resetIdle); resetIdle();
            }

            handleAudio(file) {
                const url = URL.createObjectURL(file);
                this.audioEngine.load(url);
                document.getElementById('init-screen').style.opacity = '0'; // Hide init screen
                this.audioEngine.togglePlay();
                document.getElementById('icon-play').style.display = 'none';
                document.getElementById('icon-pause').style.display = 'block';
            }

            handleLRC(file) {
                const reader = new FileReader();
                reader.onload = e => {
                    this.lyrics = LRCParser.parse(e.target.result);
                    this.currentLyricIndex = -1;
                    document.getElementById('init-screen').style.opacity = '0';
                    this.renderAllLyrics();
                };
                reader.readAsText(file);
            }

            renderAllLyrics() {
                const container = document.getElementById('lyrics-display');
                container.innerHTML = '';
                this.lyrics.forEach((lyric, index) => {
                    const div = document.createElement('div');
                    div.className = 'lyric-line future';
                    div.id = `lyric-${index}`;
                    
                    // Wave Mode : splitting characters
                    if(this.mode === 'mode-wave') {
                        const chars = lyric.text.split('');
                        chars.forEach((char, i) => {
                            const span = document.createElement('span');
                            span.textContent = char === ' ' ? '\u00A0' : char; // Preserve spaces
                            span.style.animationDelay = `${i * 0.05}s`;
                            div.appendChild(span);
                        });
                    } else {
                        div.textContent = lyric.text;
                    }
                    container.appendChild(div);
                });
            }

            formatTime(seconds) {
                if(isNaN(seconds)) return "0:00";
                const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            }

            loop() {
                this.audioEngine.updateData();
                this.visualizer.draw(this.audioEngine.bassEnergy);

                const time = this.audioEngine.audio.currentTime;
                const duration = this.audioEngine.audio.duration;

                if(duration) {
                    document.getElementById('progress-bar').style.width = `${(time/duration)*100}%`;
                    document.getElementById('time-current').textContent = this.formatTime(time);
                }

                if (this.lyrics.length > 0) {
                    let newIndex = this.lyrics.findIndex(l => l.time > time) - 1;
                    if (newIndex === -2) newIndex = this.lyrics.length - 1;

                    if (newIndex !== this.currentLyricIndex && newIndex >= 0) {
                        if(this.currentLyricIndex >= 0) {
                            const oldEl = document.getElementById(`lyric-${this.currentLyricIndex}`);
                            if(oldEl) { oldEl.classList.remove('active'); oldEl.classList.add('past'); }
                        }
                        this.currentLyricIndex = newIndex;
                        const newEl = document.getElementById(`lyric-${this.currentLyricIndex}`);
                        if(newEl) { newEl.classList.remove('future', 'past'); newEl.classList.add('active'); }
                    }

                    if (this.mode === 'mode-karaoke' && this.currentLyricIndex >= 0) {
                        const currentLrc = this.lyrics[this.currentLyricIndex];
                        let percent = Math.min(100, Math.max(0, ((time - currentLrc.time) / currentLrc.duration) * 100));
                        document.documentElement.style.setProperty('--karaoke-progress', `${percent}%`);
                    }
                }
                requestAnimationFrame(this.loop);
            }
        }

        window.onload = () => new App();
    </script>
</body>
</html>
