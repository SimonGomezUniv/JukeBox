<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SonicGlass | Expérience Immersive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --glass-bg: rgba(200, 200, 200, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --glow-primary: rgba(100, 200, 255, 0.3);
      --glow-secondary: rgba(200, 100, 255, 0.2);
      --text-primary: rgba(255, 255, 255, 0.9);
      --text-secondary: rgba(255, 255, 255, 0.6);
      --neon-blue: #00f2ff;
      --neon-purple: #bf00ff;
      --transition: cubic-bezier(0.25, 0.1, 0.25, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: var(--text-primary);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: none;
      touch-action: none;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
    }

    /* Fond animé */
    #background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(100, 200, 255, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(200, 100, 255, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(50, 50, 100, 0.3) 0%, transparent 70%);
      filter: blur(100px);
      animation: gradientShift 20s ease-in-out infinite alternate;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 0%, 100% 100%, 50% 50%; }
      100% { background-position: 100% 100%, 0% 0%, 50% 50%; }
    }

    /* Particules */
    .particle {
      position: absolute;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: float 15s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
      25% { transform: translateY(-20px) translateX(10px) scale(1.1); opacity: 0.6; }
      50% { transform: translateY(-10px) translateX(-10px) scale(0.9); opacity: 0.4; }
      75% { transform: translateY(-30px) translateX(5px) scale(1.2); opacity: 0.7; }
    }

    /* Haut-parleur en verre */
    #speaker {
      position: relative;
      width: 300px;
      height: 300px;
      z-index: 10;
      transform-style: preserve-3d;
      animation: slowRotate 60s linear infinite;
    }

    @keyframes slowRotate {
      0% { transform: rotateY(0deg) rotateX(0deg); }
      100% { transform: rotateY(360deg) rotateX(360deg); }
    }

    #speaker::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.1) 0%,
        rgba(255, 255, 255, 0.05) 50%,
        transparent 100%
      );
      border-radius: 50%;
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 30px rgba(255, 255, 255, 0.1),
        inset 0 0 30px rgba(255, 255, 255, 0.05);
      transform: translateZ(50px);
    }

    #speaker::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 120px;
      height: 120px;
      background: radial-gradient(
        circle,
        rgba(100, 200, 255, 0.2) 0%,
        transparent 70%
      );
      border-radius: 50%;
      transform: translate(-50%, -50%) translateZ(100px);
      filter: blur(10px);
      animation: pulse 2s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { opacity: 0.3; transform: translate(-50%, -50%) translateZ(100px) scale(1); }
      100% { opacity: 0.6; transform: translate(-50%, -50%) translateZ(100px) scale(1.1); }
    }

    /* Diaphragme animé */
    #diaphragm {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 80px;
      height: 80px;
      background: radial-gradient(
        circle,
        rgba(100, 200, 255, 0.4) 0%,
        rgba(100, 200, 255, 0.1) 100%
      );
      border-radius: 50%;
      transform: translate(-50%, -50%) translateZ(150px);
      transition: transform 0.1s ease-out;
    }

    /* Conteneur des paroles */
    #lyrics-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) translateZ(200px);
      width: 80%;
      max-width: 600px;
      text-align: center;
      z-index: 20;
      pointer-events: none;
    }

    .lyric-line {
      position: absolute;
      width: 100%;
      font-size: 24px;
      font-weight: 300;
      color: var(--text-secondary);
      text-shadow: 0 0 10px var(--glow-primary);
      transition: all 0.8s var(--transition);
      opacity: 0;
      transform: translateY(20px) scale(0.9);
      filter: blur(5px);
    }

    .lyric-line.active {
      color: var(--text-primary);
      text-shadow: 0 0 20px var(--glow-primary), 0 0 40px var(--glow-secondary);
      opacity: 1;
      transform: translateY(0) scale(1);
      filter: blur(0);
    }

    .lyric-line.next {
      opacity: 0.5;
      transform: translateY(10px) scale(0.95);
      filter: blur(2px);
    }

    /* Modes de paroles */
    #lyrics-container.mode-floating .lyric-line {
      animation: floating 4s infinite ease-in-out;
    }

    @keyframes floating {
      0%, 100% { transform: translateY(0) translateX(0) scale(1); }
      25% { transform: translateY(-5px) translateX(2px) scale(1.01); }
      50% { transform: translateY(-2px) translateX(-2px) scale(0.99); }
      75% { transform: translateY(-8px) translateX(1px) scale(1.02); }
    }

    #lyrics-container.mode-neon .lyric-line.active {
      color: var(--neon-blue);
      text-shadow:
        0 0 5px var(--neon-blue),
        0 0 10px var(--neon-blue),
        0 0 20px var(--neon-blue),
        0 0 40px var(--neon-purple);
      animation: neonFlicker 0.5s infinite alternate;
    }

    @keyframes neonFlicker {
      0% { opacity: 0.9; }
      100% { opacity: 1; }
    }

    #lyrics-container.mode-karaoke .lyric-line.active {
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 200% 100%;
      animation: karaokeFill 2s linear forwards;
    }

    @keyframes karaokeFill {
      0% { background-position: -200% 0; }
      100% { background-position: 0 0; }
    }

    #lyrics-container.mode-wave .lyric-line.active {
      display: flex;
      justify-content: center;
    }

    #lyrics-container.mode-wave .lyric-line.active span {
      display: inline-block;
      animation: waveChar 1s infinite ease-in-out;
      animation-delay: calc(var(--char-index) * 0.1s);
    }

    @keyframes waveChar {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* Contrôles */
    #controls {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 500px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      z-index: 30;
      opacity: 0;
      transition: opacity 0.5s var(--transition);
      pointer-events: none;
    }

    #controls.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .control-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s var(--transition);
      pointer-events: auto;
    }

    .control-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.1);
    }

    .control-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    #progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      position: relative;
      cursor: pointer;
      pointer-events: auto;
    }

    #progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    #progress-handle {
      position: absolute;
      top: 50%;
      left: 0;
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px var(--neon-blue);
    }

    /* Mode minimal */
    #lyrics-container.mode-minimal .lyric-line {
      font-size: 32px;
      font-weight: 200;
      letter-spacing: 2px;
    }

    #lyrics-container.mode-minimal .lyric-line.active {
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
    }

    /* Visualiseur audio */
    #visualizer {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 200px;
      height: 200px;
      transform: translate(-50%, -50%) translateZ(100px);
      z-index: 5;
      pointer-events: none;
    }

    #visualizer canvas {
      width: 100%;
      height: 100%;
    }

    /* God Rays */
    #god-rays {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(
        circle at 50% 50%,
        transparent 0%,
        rgba(100, 200, 255, 0.05) 50%,
        transparent 100%
      );
      filter: blur(50px);
      animation: godRaysRotate 120s linear infinite;
    }

    @keyframes godRaysRotate {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      #speaker { width: 200px; height: 200px; }
      .lyric-line { font-size: 18px; }
      #lyrics-container.mode-minimal .lyric-line { font-size: 24px; }
    }

    @media (max-width: 480px) {
      #speaker { width: 150px; height: 150px; }
      .lyric-line { font-size: 16px; }
      #controls { bottom: 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Fond animé -->
    <div id="background"></div>
    <div id="god-rays"></div>

    <!-- Particules -->
    <div class="particle" style="width: 10px; height: 10px; top: 10%; left: 15%; animation-delay: 0s;"></div>
    <div class="particle" style="width: 5px; height: 5px; top: 20%; left: 80%; animation-delay: 2s;"></div>
    <div class="particle" style="width: 8px; height: 8px; top: 60%; left: 25%; animation-delay: 4s;"></div>
    <div class="particle" style="width: 12px; height: 12px; top: 80%; left: 70%; animation-delay: 6s;"></div>
    <div class="particle" style="width: 6px; height: 6px; top: 30%; left: 50%; animation-delay: 8s;"></div>

    <!-- Haut-parleur -->
    <div id="speaker">
      <div id="diaphragm"></div>
    </div>

    <!-- Visualiseur -->
    <div id="visualizer">
      <canvas id="visualizer-canvas"></canvas>
    </div>

    <!-- Paroles -->
    <div id="lyrics-container">
      <!-- Les lignes de paroles seront injectées ici -->
    </div>

    <!-- Contrôles -->
    <div id="controls">
      <button class="control-btn" id="prev-btn">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="control-btn" id="play-btn">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="control-btn" id="next-btn">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6zm2-16v20h2V2z"/></svg>
      </button>
      <div id="progress-bar">
        <div id="progress-fill"></div>
        <div id="progress-handle"></div>
      </div>
      <button class="control-btn" id="volume-btn">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9z"/></svg>
      </button>
      <button class="control-btn" id="mode-btn">Mode</button>
    </div>
  </div>

  <script>
    // ======================
    // CLASSES PRINCIPALES
    // ======================

    class AudioPlayer {
      constructor() {
        this.audio = new Audio();
        this.audioContext = null;
        this.analyser = null;
        this.source = null;
        this.dataArray = null;
        this.isPlaying = false;
        this.currentTime = 0;
        this.duration = 0;
        this.volume = 0.7;
        this.audio.src = '';
        this.initAudioContext();
        this.setupEventListeners();
      }

      initAudioContext() {
        this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        this.analyser = this.audioContext.createAnalyser();
        this.analyser.fftSize = 256;
        this.dataArray = new Uint8Array(this.analyser.frequencyBinCount);
        this.source = this.audioContext.createMediaElementSource(this.audio);
        this.source.connect(this.analyser);
        this.analyser.connect(this.audioContext.destination);
      }

      setupEventListeners() {
        this.audio.addEventListener('loadedmetadata', () => {
          this.duration = this.audio.duration;
          ui.updateProgress(0);
        });

        this.audio.addEventListener('timeupdate', () => {
          this.currentTime = this.audio.currentTime;
          ui.updateProgress(this.currentTime / this.duration);
          lyrics.update(this.currentTime);
        });

        this.audio.addEventListener('ended', () => {
          this.isPlaying = false;
          ui.updatePlayButton();
        });
      }

      loadAudio(file) {
        const url = URL.createObjectURL(file);
        this.audio.src = url;
        this.audio.load();
        this.audio.volume = this.volume;
      }

      loadLRC(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          lyrics.parseLRC(e.target.result);
        };
        reader.readAsText(file);
      }

      play() {
        if (this.audioContext.state === 'suspended') {
          this.audioContext.resume();
        }
        this.audio.play().then(() => {
          this.isPlaying = true;
          ui.updatePlayButton();
        }).catch(e => console.error(e));
      }

      pause() {
        this.audio.pause();
        this.isPlaying = false;
        ui.updatePlayButton();
      }

      togglePlay() {
        if (this.isPlaying) this.pause();
        else this.play();
      }

      seek(time) {
        this.audio.currentTime = time * this.duration;
      }

      setVolume(volume) {
        this.volume = volume;
        this.audio.volume = volume;
      }

      getFrequencyData() {
        if (this.analyser) {
          this.analyser.getByteFrequencyData(this.dataArray);
          return this.dataArray;
        }
        return null;
      }
    }

    class Lyrics {
      constructor() {
        this.lines = [];
        this.currentIndex = -1;
        this.container = document.getElementById('lyrics-container');
        this.mode = 'floating';
        this.modes = ['floating', 'karaoke', 'neon', 'wave', 'minimal'];
        this.currentModeIndex = 0;
      }

      parseLRC(content) {
        this.lines = [];
        const lines = content.split('\n');
        lines.forEach(line => {
          const match = line.match(/\[(\d+):(\d+)\.(\d+)\](.*)/);
          if (match) {
            const time = parseInt(match[1]) * 60 + parseInt(match[2]) + parseInt(match[3]) / 1000;
            this.lines.push({ time, text: match[4] });
          }
        });
        this.render();
      }

      render() {
        this.container.innerHTML = '';
        this.lines.forEach((line, index) => {
          const lineEl = document.createElement('div');
          lineEl.className = 'lyric-line';
          lineEl.textContent = line.text;
          lineEl.dataset.index = index;
          this.container.appendChild(lineEl);
        });
        this.updateMode();
      }

      update(currentTime) {
        let newIndex = -1;
        for (let i = 0; i < this.lines.length; i++) {
          if (this.lines[i].time <= currentTime) {
            newIndex = i;
          } else {
            break;
          }
        }

        if (newIndex !== this.currentIndex) {
          this.currentIndex = newIndex;
          this.updateActiveLine();
        }
      }

      updateActiveLine() {
        const lines = this.container.querySelectorAll('.lyric-line');
        lines.forEach(line => {
          line.classList.remove('active', 'next');
        });

        if (this.currentIndex >= 0) {
          const activeLine = lines[this.currentIndex];
          if (activeLine) {
            activeLine.classList.add('active');
            if (this.currentIndex + 1 < lines.length) {
              lines[this.currentIndex + 1].classList.add('next');
            }
          }
        }
      }

      nextMode() {
        this.currentModeIndex = (this.currentModeIndex + 1) % this.modes.length;
        this.mode = this.modes[this.currentModeIndex];
        this.updateMode();
      }

      updateMode() {
        this.container.className = '';
        this.container.classList.add('mode-' + this.mode);

        if (this.mode === 'wave') {
          const activeLine = this.container.querySelector('.lyric-line.active');
          if (activeLine) {
            const chars = activeLine.textContent.split('');
            activeLine.innerHTML = chars.map((char, i) =>
              `<span style="--char-index: ${i}">${char}</span>`
            ).join('');
          }
        }
      }
    }

    class Visualizer {
      constructor() {
        this.canvas = document.getElementById('visualizer-canvas');
        this.ctx = this.canvas.getContext('2d');
        this.width = 200;
        this.height = 200;
        this.canvas.width = this.width;
        this.canvas.height = this.height;
        this.centerX = this.width / 2;
        this.centerY = this.height / 2;
        this.radius = Math.min(this.width, this.height) * 0.4;
        this.bars = [];
        this.initBars();
        this.animate();
      }

      initBars() {
        for (let i = 0; i < 32; i++) {
          this.bars.push({
            angle: (i / 32) * Math.PI * 2,
            length: 0,
            targetLength: 0,
            width: 2 + Math.random() * 3,
            color: `hsl(${200 + Math.random() * 50}, 100%, ${50 + Math.random() * 30}%)`
          });
        }
      }

      update(frequencies) {
        if (!frequencies) return;

        for (let i = 0; i < this.bars.length; i++) {
          const bar = this.bars[i];
          const index = Math.floor(i * (frequencies.length / this.bars.length));
          bar.targetLength = (frequencies[index] / 255) * this.radius * 1.5;
        }
      }

      draw() {
        this.ctx.clearRect(0, 0, this.width, this.height);

        // Effet de glow
        this.ctx.filter = 'blur(10px)';
        this.ctx.globalAlpha = 0.5;
        this.bars.forEach(bar => {
          const x = this.centerX + Math.cos(bar.angle) * bar.length * 0.8;
          const y = this.centerY + Math.sin(bar.angle) * bar.length * 0.8;
          this.ctx.beginPath();
          this.ctx.arc(x, y, bar.width * 2, 0, Math.PI * 2);
          this.ctx.fillStyle = bar.color;
          this.ctx.fill();
        });
        this.ctx.filter = 'none';
        this.ctx.globalAlpha = 1;

        // Barres principales
        this.bars.forEach(bar => {
          bar.length += (bar.targetLength - bar.length) * 0.1;

          const x1 = this.centerX + Math.cos(bar.angle) * this.radius * 0.3;
          const y1 = this.centerY + Math.sin(bar.angle) * this.radius * 0.3;
          const x2 = this.centerX + Math.cos(bar.angle) * (this.radius * 0.3 + bar.length);
          const y2 = this.centerY + Math.sin(bar.angle) * (this.radius * 0.3 + bar.length);

          this.ctx.beginPath();
          this.ctx.moveTo(x1, y1);
          this.ctx.lineTo(x2, y2);
          this.ctx.lineWidth = bar.width;
          this.ctx.strokeStyle = bar.color;
          this.ctx.lineCap = 'round';
          this.ctx.stroke();
        });
      }

      animate() {
        this.draw();
        requestAnimationFrame(() => this.animate());
      }
    }

    class UI {
      constructor() {
        this.playBtn = document.getElementById('play-btn');
        this.progressBar = document.getElementById('progress-bar');
        this.progressFill = document.getElementById('progress-fill');
        this.progressHandle = document.getElementById('progress-handle');
        this.controls = document.getElementById('controls');
        this.modeBtn = document.getElementById('mode-btn');
        this.diaphragm = document.getElementById('diaphragm');
        this.speaker = document.getElementById('speaker');
        this.visualizer = new Visualizer();
        this.setupEventListeners();
        this.hideControlsTimer = null;
      }

      setupEventListeners() {
        // Boutons de contrôle
        document.getElementById('play-btn').addEventListener('click', () => audioPlayer.togglePlay());
        document.getElementById('prev-btn').addEventListener('click', () => this.prevTrack());
        document.getElementById('next-btn').addEventListener('click', () => this.nextTrack());
        document.getElementById('volume-btn').addEventListener('click', () => this.toggleMute());
        document.getElementById('mode-btn').addEventListener('click', () => {
          lyrics.nextMode();
          this.modeBtn.textContent = lyrics.mode.charAt(0).toUpperCase() + lyrics.mode.slice(1);
        });

        // Barre de progression
        this.progressBar.addEventListener('click', (e) => {
          const rect = this.progressBar.getBoundingClientRect();
          const percent = (e.clientX - rect.left) / rect.width;
          audioPlayer.seek(percent);
        });

        // Glisser-déposer
        document.addEventListener('dragover', (e) => {
          e.preventDefault();
          this.controls.classList.add('visible');
        });

        document.addEventListener('drop', (e) => {
          e.preventDefault();
          this.controls.classList.add('visible');
          this.clearHideControlsTimer();

          const files = e.dataTransfer.files;
          files.forEach(file => {
            if (file.name.endsWith('.mp3') || file.name.endsWith('.wav') || file.name.endsWith('.ogg')) {
              audioPlayer.loadAudio(file);
            } else if (file.name.endsWith('.lrc')) {
              audioPlayer.loadLRC(file);
            }
          });
        });

        // Collage
        document.addEventListener('paste', (e) => {
          const items = e.clipboardData.items;
          for (let i = 0; i < items.length; i++) {
            if (items[i].kind === 'file') {
              const file = items[i].getAsFile();
              if (file.name.endsWith('.lrc')) {
                audioPlayer.loadLRC(file);
              }
            } else if (items[i].kind === 'string' && items[i].type === 'text/plain') {
              items[i].getAsString(text => {
                lyrics.parseLRC(text);
              });
            }
          }
        });

        // Affichage/masquage des contrôles
        document.addEventListener('mousemove', () => {
          this.controls.classList.add('visible');
          this.clearHideControlsTimer();
          this.hideControlsTimer = setTimeout(() => {
            this.controls.classList.remove('visible');
          }, 3000);
        });

        document.addEventListener('touchstart', () => {
          this.controls.classList.add('visible');
          this.clearHideControlsTimer();
        });

        // Animation du diaphragme
        setInterval(() => {
          if (audioPlayer.isPlaying) {
            const frequencies = audioPlayer.getFrequencyData();
            if (frequencies) {
              const bass = frequencies.reduce((a, b) => a + b, 0) / frequencies.length;
              const scale = 1 + (bass / 255) * 0.3;
              this.diaphragm.style.transform = `translate(-50%, -50%) translateZ(150px) scale(${scale})`;
              this.visualizer.update(frequencies);
            }
          }
        }, 100);
      }

      clearHideControlsTimer() {
        if (this.hideControlsTimer) {
          clearTimeout(this.hideControlsTimer);
          this.hideControlsTimer = null;
        }
      }

      updateProgress(percent) {
        this.progressFill.style.width = `${percent * 100}%`;
        this.progressHandle.style.left = `${percent * 100}%`;
      }

      updatePlayButton() {
        const svg = this.playBtn.querySelector('svg');
        if (audioPlayer.isPlaying) {
          svg.innerHTML = '<path d="M6 6h4v12H6zm8 0h4v12h-4z"/>';
        } else {
          svg.innerHTML = '<path d="M8 5v14l11-7z"/>';
        }
      }

      prevTrack() {
        // À implémenter selon ta logique de playlist
        console.log('Previous track');
      }

      nextTrack() {
        // À implémenter selon ta logique de playlist
        console.log('Next track');
      }

      toggleMute() {
        audioPlayer.setVolume(audioPlayer.volume > 0 ? 0 : 0.7);
      }
    }

    // ======================
    // INITIALISATION
    // ======================

    const audioPlayer = new AudioPlayer();
    const lyrics = new Lyrics();
    const ui = new UI();

    // Initialisation des particules supplémentaires
    for (let i = 0; i < 15; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.width = `${3 + Math.random() * 10}px`;
      particle.style.height = particle.style.width;
      particle.style.top = `${10 + Math.random() * 80}%`;
      particle.style.left = `${10 + Math.random() * 80}%`;
      particle.style.animationDelay = `${Math.random() * 10}s`;
      document.getElementById('app').appendChild(particle);
    }

    // Message d'accueil
    lyrics.parseLRC(`[00:00.00]Glisse un fichier audio (MP3, WAV, OGG)
[00:01.00]ou des paroles (LRC) ici.
[00:02.00]Ou colle du texte LRC.
[00:03.00]Appuie sur "Mode" pour changer d'affichage.`);
  </script>
</body>
</html>
